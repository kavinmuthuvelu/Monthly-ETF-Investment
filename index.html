<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:#07090F;color:#D8E3EF;min-height:100vh}

.card{background:linear-gradient(145deg,#0E1520,#0A1018);border:1px solid #18263A;border-radius:16px;padding:22px}
.row-item{border:1px solid #18263A;border-radius:12px;padding:15px 18px;background:#090E18;transition:border-color .2s,transform .15s;margin-bottom:11px}
.row-item:hover{border-color:#253A58;transform:translateX(2px)}
.stat-card{background:#090E18;border:1px solid #18263A;border-radius:12px;padding:15px;text-align:center}
.stat-label{font-size:10px;color:#40556A;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.stat-val{font-family:'DM Mono',monospace;font-size:20px;font-weight:700}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}

.btn{padding:9px 17px;border-radius:9px;border:none;cursor:pointer;font-family:inherit;font-weight:600;font-size:13px;transition:all .18s;display:inline-flex;align-items:center;gap:6px}

.btn-blue{background:linear-gradient(135deg,#1351A8,#0278B8);color:#fff}

.btn-amber{background:linear-gradient(135deg,#7A4A00,#B87200);color:#FDE68A}

.badge-green{background:#053D2F20;border:1px solid #059669;color:#6EE7B7}
.badge-red{background:#65000020;border:1px solid #7F1D1D;color:#FCA5A5}
.badge-amber{background:#78350f30;border:1px solid #78350f;color:#D97706}

.anim-fade{animation:fadeIn .35s ease forwards}
.spin{animation:spin .85s linear infinite;display:inline-block}
.live-dot{animation:pulse 2s infinite;width:6px;height:6px;border-radius:50%;background:#6EE7B7;display:inline-block}

/* ── Bright calendar picker icon ── */
input[type="date"]::-webkit-calendar-picker-indicator{
  filter:invert(1) brightness(3) sepia(1) hue-rotate(175deg) saturate(4);
  cursor:pointer;opacity:1}

/* ── Env toggle ── */

.req-row:last-child{border-bottom:none}

/* ── Order modal ── */

.om-polling{background:#130A00;border-color:#78350f;color:#FCD34D}
.om-done   {background:#053D2F;border-color:#059669;color:#6EE7B7}

.om-error  {background:#650E0E;border-color:#DC2626;color:#FCA5A5}

/* ── Today orders table ── */
.ord-table{width:100%;border-collapse:collapse;font-size:12px}
.ord-table th{padding:7px 10px;text-align:left;font-size:10px;color:#40556A;text-transform:uppercase;letter-spacing:.8px;border-bottom:1px solid #18263A;background:#090E18}

</style>

<body>
<div id="app"></div>

<script>
/* ══════════════════════════════════════════════════
   DATA
══════════════════════════════════════════════════ */
const PORTFOLIO = [
  {id:"niftybees",
   category:"Nifty 50",
   weight:30,
   instrument:"Nippon India ETF Nifty 50 BeES",

  {id:"ppfcf",

   ticker:"PPFCF",
   isin:"INF879O01027",

   amc:"PPFAS Mutual Fund",
   mfSchemeCode:122639},

  {id:"mon100",
   category:"Global Tech",
   weight:11,
   instrument:"Motilal Oswal Nasdaq 100 ETF",
   ticker:"MON100",
   isin:"INF247L01792",
   type:"ETF",
   color:"#BA68C8",
   icon:"🌐",
   securityId:null},

  {id:"goldbees",
   category:"Gold",
   weight:5,
   instrument:"Nippon India ETF Gold BeES",
   ticker:"GOLDBEES",
   isin:"INF204KB17I4",
   type:"ETF",
   color:"#FFD54F",
   icon:"🥇",
   securityId:null},

  {id:"silverbees",
   category:"Silver",
   weight:5,
   instrument:"Nippon India Silver ETF",
   ticker:"SILVERBEES",
   isin:"INF204KC1402",
   type:"ETF",
   color:"#C0C0C0",
   icon:"🥈",
   securityId:null},
];

const ETF_PORTFOLIO = PORTFOLIO.filter(p=>p.type==="ETF");
const MF_PORTFOLIO  = PORTFOLIO.filter(p=>p.type==="MF");
const STRATEGY_ETF  = ETF_PORTFOLIO;

const ISIN_MAP   = Object.fromEntries(ETF_PORTFOLIO.map(p=>[p.isin.toUpperCase(), p]));
const SYMBOL_MAP = Object.fromEntries(ETF_PORTFOLIO.map(p=>[p.ticker.toUpperCase(), p]));
const BASE_SIP = 22000;
const SNAP_KEY = "portfolio_snapshots";

/* Safe localStorage wrapper — gracefully handles sandboxed iframes (Claude preview,
   file:// origins, private-browsing restrictions) where localStorage throws SecurityError */
const safeLs = {
  get(k, fallback=""){
    try{ const v=localStorage.getItem(k); return v!==null?v:fallback; }catch{ return fallback; }
  },
  set(k,v){ try{ localStorage.setItem(k,v); }catch{} },
  remove(k){ try{ localStorage.removeItem(k); }catch{} },
  clear(){ try{ localStorage.clear(); }catch{} },
};

/* ══════════════════════════════════════════════════
   STATE
══════════════════════════════════════════════════ */
const S = {
  apiKey:    safeLs.get("dhan_api_key"),
  clientId:  safeLs.get("dhan_client_id"),
  startDate: safeLs.get("start_date"),
  trackingStartDate: safeLs.get("tracking_start_date"),
  proxyUrl:  (()=>{
    const saved = safeLs.get("proxy_url");
    if(saved) return saved; // always trust an explicitly saved value
    // Auto-detect: if running on a real server (not localhost/file), use same origin as proxy
    const proto = (typeof location!=="undefined"?location.protocol:"http:");
    const host  = (typeof location!=="undefined"?location.hostname:"localhost");
    const isLocal = host==="localhost"||host==="127.0.0.1"||host===""||proto==="file:";
    return isLocal ? "http://localhost:8080" : (proto+"//"+location.host);
  })(),
  dhanEnv:   safeLs.get("dhan_env","production"),
  proxyActive:   false,
  proxyTesting:  false,
  renewingToken: false,
  connected:     false,
  tab:       "portfolio",
  orderMode: "app",
  lossPercent:   0,
  etfHoldings:   [],
  unmatchedHoldings: [],
  expandedTicker: null,
  showOtherHoldings: false,
  portfolioLoading: false,
  portfolioError:   null,
  lastRefreshed:    null,
  isDemo:    false,
  snapshots: loadSnapshots(),
  snap30:    null,
  thirtyDayPnLPct: 0,
  orders:    [],
  todayOrders: [],
  todayOrdersLoading: false,
  todayOrdersError:   null,
  funds: null,
  fundsLoading: false,
  fundsError: null,
  reqLog:    [],
  mfHoldings: loadMFHoldings(),
  mfNavs:     {},
  mfNavLoading: false,
  mfNavError: null,
  nifty50History: null,
  nifty50Loading: false,
  nifty50Error:   null,
  chartInstance:  null,
  toastTimer:null,
  refreshTimer:null,
  om: {
    open:false, p:null, phase:"idle",
    orderId:null, message:"", charges:null,
    tradedPrice:null, tradedQty:null, amount:0,
    pollCount:0, pollTimer:null,
  }
};

function normaliseDate(d){
  if(!d) return "";
  if(/^\d{4}-\d{2}-\d{2}$/.test(d)) return d;
  if(/^\d{2}\/\d{2}\/\d{4}$/.test(d)){
    const [dd,mm,yyyy]=d.split("/"); return `${yyyy}-${mm.padStart(2,"0")}-${dd.padStart(2,"0")}`;
  }
  try{ return new Date(d).toISOString().slice(0,10); } catch{ return d; }
}

function buildAxisDates(startD){
  const axisDates=[];
  let cur=new Date(startD); const end=new Date();
  while(cur<=end){ axisDates.push(cur.toISOString().slice(0,10)); cur.setMonth(cur.getMonth()+1); }
  const today=new Date().toISOString().slice(0,10);
  if(axisDates[axisDates.length-1]!==today) axisDates.push(today);
  return axisDates;
}

function buildCumulativeInvested(axisDates){
  // Build cashflow list from MF entries (dated) + ETF total (anchored to trackingStartDate)
  const cashflows = []; // [{isoDate, amount}]

  // MF entries — each has a real date
  MF_PORTFOLIO.forEach(p=>{
    (S.mfHoldings[p.isin]||[]).forEach(e=>{
      const d = e.date || (S.trackingStartDate||axisDates[0]);
      cashflows.push({isoDate: d.slice(0,10), amount: e.amount||0});
    });
  });

  // ETF — we know total invested but not per-trade dates.
  // Spread it as a single lumpsum at the trackingStartDate (or chart start).
  const etfInv = S.etfHoldings.reduce((s,h)=>s+(h.investedValue||0),0);
  if(etfInv>0){
    const anchor = S.trackingStartDate||axisDates[0];
    cashflows.push({isoDate: anchor.slice(0,10), amount: etfInv});
  }

  if(!cashflows.length) return axisDates.map(()=>0);

  cashflows.sort((a,b)=>a.isoDate.localeCompare(b.isoDate));

  let cum=0, ci=0;
  return axisDates.map(d=>{
    while(ci<cashflows.length && cashflows[ci].isoDate<=d){ cum+=cashflows[ci].amount; ci++; }
    return cum||null;
  });
}

function buildNifty50Comparison(axisDates){
  if(!S.nifty50History) return null;
  const {dates:nd, closes:nc} = S.nifty50History;
  if(!nd||!nd.length) return null;

  // Build price lookup map
  const priceMap={};
  nd.forEach((d,i)=>{ priceMap[d]=nc[i]; });
  function priceAt(d){
    // Find latest price on or before d
    let p=null;
    for(let i=0;i<nd.length;i++){ if(nd[i]<=d) p=nc[i]; else break; }
    return p;
  }

  // Build same cashflows as buildCumulativeInvested
  const cashflows=[];
  MF_PORTFOLIO.forEach(p=>{
    (S.mfHoldings[p.isin]||[]).forEach(e=>{
      cashflows.push({isoDate:(e.date||axisDates[0]).slice(0,10), amount:e.amount||0});
    });
  });
  const etfInv=S.etfHoldings.reduce((s,h)=>s+(h.investedValue||0),0);
  if(etfInv>0) cashflows.push({isoDate:(S.trackingStartDate||axisDates[0]).slice(0,10), amount:etfInv});
  if(!cashflows.length) return null;
  cashflows.sort((a,b)=>a.isoDate.localeCompare(b.isoDate));

  // Simulate: on each cashflow date, buy Nifty50 units at that day's price
  let totalUnits=0, ci=0;
  return axisDates.map(d=>{
    while(ci<cashflows.length && cashflows[ci].isoDate<=d){
      const price=priceAt(cashflows[ci].isoDate);
      if(price>0) totalUnits+=cashflows[ci].amount/price;
      ci++;
    }
    const curPrice=priceAt(d);
    if(!curPrice||totalUnits===0) return null;
    return parseFloat((totalUnits*curPrice).toFixed(2));
  });
}


function computeXIRR(curVal){
  try{
    // Build cashflows from MF entries (dated) + ETF invested anchored to trackingStartDate
    const cfs=[];
    MF_PORTFOLIO.forEach(p=>{
      (S.mfHoldings[p.isin]||[]).forEach(e=>{
        cfs.push({date:new Date(e.date||S.trackingStartDate||"2024-01-01"), amount:-(e.amount||0)});
      });
    });
    const etfInv=S.etfHoldings.reduce((s,h)=>s+(h.investedValue||0),0);
    if(etfInv>0) cfs.push({date:new Date(S.trackingStartDate||"2024-01-01"), amount:-etfInv});
    if(!cfs.length||!curVal) return "—";
    cfs.sort((a,b)=>a.date-b.date);
    cfs.push({date:new Date(), amount:curVal});
    const npv=(r)=>cfs.reduce((s,{date,amount})=>{
      const t=(date-cfs[0].date)/(365.25*24*3600*1000);
      return s+amount/Math.pow(1+r,t);
    },0);
    let r=0.1;
    for(let i=0;i<60;i++){
      const f=npv(r), df=(npv(r+1e-6)-f)/1e-6;
      if(Math.abs(df)<1e-12) break;
      const nr=r-f/df;
      if(Math.abs(nr-r)<1e-7){r=nr;break;}
      r=nr; if(r<-0.99)r=-0.5; if(r>10)r=2;
    }
    if(isNaN(r)||!isFinite(r)) return "—";
    return `${r>=0?"+":""}${(r*100).toFixed(1)}%`;
  }catch{return "—";}
}

async function fetchNifty50History(){
  S.nifty50Loading=true; S.nifty50Error=null;
  if(S.tab==="growth") render();

  // Determine range: from trackingStartDate or 2 years back
  const startD = S.trackingStartDate || new Date(Date.now()-86400000*730).toISOString().slice(0,10);
  const startTs = Math.floor(new Date(startD).getTime()/1000);
  const endTs   = Math.floor(Date.now()/1000);

  // Yahoo Finance API — public, CORS-open from browser
  const url = `https://query1.finance.yahoo.com/v8/finance/chart/%5ENSEI?interval=1wk&period1=${startTs}&period2=${endTs}&events=history`;

  try{
    const r = await fetch(url, {signal:AbortSignal.timeout(15000),
      headers:{"Accept":"application/json"}});
    if(!r.ok) throw new Error("Yahoo Finance HTTP "+r.status);
    const j = await r.json();
    const res = j?.chart?.result?.[0];
    if(!res) throw new Error("No data in Yahoo response");

    const timestamps = res.timestamps || res.timestamp;
    const closes     = res.indicators?.quote?.[0]?.close;
    if(!timestamps?.length||!closes?.length) throw new Error("Empty price data");

    const dates=[], validCloses=[];
    timestamps.forEach((ts,i)=>{
      const v = closes[i];
      if(v==null||isNaN(v)) return;
      dates.push(new Date(ts*1000).toISOString().slice(0,10));
      validCloses.push(parseFloat(v.toFixed(2)));
    });

    if(!dates.length) throw new Error("No valid price points");

    S.nifty50History = {dates, closes:validCloses};
    showToast(`Nifty50: ${dates.length} weekly data points loaded ✓`);
    console.log(`Nifty50 loaded: ${dates[0]} → ${dates[dates.length-1]}, ${dates.length} points`);
  } catch(e){
    // Try alternate Yahoo endpoint
    try{
      const url2 = `https://query2.finance.yahoo.com/v8/finance/chart/%5ENSEI?interval=1wk&period1=${startTs}&period2=${endTs}`;
      const r2 = await fetch(url2, {signal:AbortSignal.timeout(12000)});
      if(!r2.ok) throw new Error("Yahoo2 HTTP "+r2.status);
      const j2 = await r2.json();
      const res2 = j2?.chart?.result?.[0];
      const timestamps2 = res2?.timestamps || res2?.timestamp;
      const closes2     = res2?.indicators?.quote?.[0]?.close;
      if(!timestamps2?.length||!closes2?.length) throw new Error("Empty");
      const dates2=[], cls2=[];
      timestamps2.forEach((ts,i)=>{ const v=closes2[i]; if(v!=null&&!isNaN(v)){dates2.push(new Date(ts*1000).toISOString().slice(0,10));cls2.push(parseFloat(v.toFixed(2)));} });
      S.nifty50History={dates:dates2,closes:cls2};
      showToast(`Nifty50: ${dates2.length} weekly data points loaded ✓`);
    } catch(e2){
      S.nifty50Error = "Yahoo Finance blocked — try again or use proxy. "+e.message;
      showToast("Nifty50 fetch failed: "+e.message,"error");
    }
  }

  S.nifty50Loading=false;
  if(S.tab==="growth"){ render(); requestAnimationFrame(buildGrowthChart); }
}

function buildGrowthChart(){
  destroyChart();
  const canvas=document.getElementById("growth-chart");
  if(!canvas) return;

  const startD = S.trackingStartDate
               || new Date(Date.now()-86400000*730).toISOString().slice(0,10);
  const axisDates = buildAxisDates(startD);
  const today = axisDates[axisDates.length-1];
  const investedData = buildCumulativeInvested(axisDates);

  const snapMap={};
  S.snapshots.forEach(s=>{
    if(!S.trackingStartDate||s.date>=S.trackingStartDate) snapMap[s.date]=s.value;
  });
  if(S.etfHoldings.length||MF_PORTFOLIO.some(p=>S.mfHoldings[p.isin])){
    snapMap[today]=totalCurrent()+(MF_PORTFOLIO.reduce((s,p)=>s+(mfCurrentValue(p.isin)||0),0));
  }
  const sortedSnaps=Object.keys(snapMap).sort();
  const portfolioData=axisDates.map(d=>{
    let best=null;
    for(const sd of sortedSnaps){ if(sd<=d) best=snapMap[sd]; else break; }
    return best;
  });
  const niftyData = buildNifty50Comparison(axisDates);

  // ── Pure Canvas 2D chart — no external dependencies ────────────────────────
  const W=canvas.offsetWidth||canvas.parentElement?.offsetWidth||800;
  const H=480;
  canvas.width=W; canvas.height=H;
  const ctx=canvas.getContext("2d");
  const PAD={t:30,r:20,b:50,l:72};
  const cW=W-PAD.l-PAD.r, cH=H-PAD.t-PAD.b;

  // Thin all data to max ~60 points for readability
  const step=Math.max(1,Math.floor(axisDates.length/60));
  const idxs=axisDates.map((_,i)=>i).filter(i=>i%step===0||i===axisDates.length-1);
  const tLabels=idxs.map(i=>{ const d=new Date(axisDates[i]); return d.toLocaleDateString("en-IN",{month:"short",year:"2-digit"}); });
  const tInv=idxs.map(i=>investedData[i]);
  const tPort=idxs.map(i=>portfolioData[i]);
  const tNifty=niftyData?idxs.map(i=>niftyData[i]):null;

  const allVals=[...tInv,...tPort,...(tNifty||[])].filter(v=>v!=null&&v>0);
  if(!allVals.length){ ctx.clearRect(0,0,W,H); return; }
  const minV=0, maxV=Math.max(...allVals)*1.08;

  const xOf=i=>PAD.l+(i/(idxs.length-1||1))*cW;
  const yOf=v=>PAD.t+cH-(((v-minV)/(maxV-minV||1))*cH);
  const fmtY=v=>v>=1e7?"₹"+(v/1e7).toFixed(1)+"Cr":v>=1e5?"₹"+(v/1e5).toFixed(1)+"L":v>=1e3?"₹"+(v/1e3).toFixed(0)+"K":"₹"+v.toFixed(0);

  // Background
  ctx.fillStyle="#090E18"; ctx.fillRect(0,0,W,H);

  // Grid lines
  const yTicks=6;
  ctx.strokeStyle="rgba(24,38,58,0.8)"; ctx.lineWidth=1;
  for(let i=0;i<=yTicks;i++){
    const y=PAD.t+(cH/yTicks)*i;
    ctx.beginPath(); ctx.moveTo(PAD.l,y); ctx.lineTo(PAD.l+cW,y); ctx.stroke();
    const val=maxV-(maxV/yTicks)*i;
    ctx.fillStyle="#40556A"; ctx.font="11px DM Mono,monospace";
    ctx.textAlign="right"; ctx.fillText(fmtY(val),PAD.l-6,y+4);
  }

  // X axis labels (every ~7 ticks)
  ctx.fillStyle="#40556A"; ctx.font="11px DM Sans,sans-serif"; ctx.textAlign="center";
  const xStep=Math.max(1,Math.floor(idxs.length/10));
  tLabels.forEach((lbl,i)=>{ if(i%xStep===0||i===tLabels.length-1) ctx.fillText(lbl,xOf(i),H-PAD.b+18); });

  // Helper: draw a line series
  function drawLine(data, color, dashed=false, fill=false, stepped=false){
    const pts=data.map((v,i)=>v!=null?{x:xOf(i),y:yOf(v)}:null);
    if(fill){
      ctx.beginPath(); let started=false;
      pts.forEach((p,i)=>{ if(!p) return; if(!started){ctx.moveTo(p.x,yOf(0));ctx.lineTo(p.x,p.y);started=true;}else{if(stepped)ctx.lineTo(p.x,pts[i-1]?.y??p.y);ctx.lineTo(p.x,p.y);} });
      if(started){ const last=pts.filter(Boolean).at(-1); ctx.lineTo(last.x,yOf(0)); }
      ctx.closePath();
      ctx.fillStyle=color.replace(")",",0.07)").replace("rgb","rgba");
      ctx.fill();
    }
    ctx.beginPath(); ctx.strokeStyle=color; ctx.lineWidth=dashed?2:2.5;
    if(dashed) ctx.setLineDash([6,3]); else ctx.setLineDash([]);
    let first=true;
    pts.forEach((p,i)=>{
      if(!p){ first=true; return; }
      if(first){ ctx.moveTo(p.x,p.y); first=false; }
      else{ if(stepped&&i>0&&pts[i-1]) ctx.lineTo(p.x,pts[i-1].y); ctx.lineTo(p.x,p.y); }
    });
    ctx.stroke(); ctx.setLineDash([]);
  }

  // Draw series
  drawLine(tInv,"#4FC3F7",true,false,true);
  if(tPort.some(v=>v!=null)) drawLine(tPort,"#4ADE80",false,false);
  if(tNifty&&tNifty.some(v=>v!=null)) drawLine(tNifty,"#FB923C",false,false);

  // Legend
  const legend=[
    {color:"#4FC3F7",dash:true,label:"Invested (ETF+MF)"},
    ...(tPort.some(v=>v!=null)?[{color:"#4ADE80",dash:false,label:"Portfolio Value"}]:[]),
    ...(tNifty&&tNifty.some(v=>v!=null)?[{color:"#FB923C",dash:false,label:"Nifty50 (same invest)"}]:[]),
  ];
  let lx=PAD.l;
  legend.forEach(({color,dash,label})=>{
    ctx.strokeStyle=color; ctx.lineWidth=2; ctx.setLineDash(dash?[5,3]:[]);
    ctx.beginPath(); ctx.moveTo(lx,16); ctx.lineTo(lx+22,16); ctx.stroke(); ctx.setLineDash([]);
    ctx.fillStyle="#94A3B8"; ctx.font="12px DM Sans,sans-serif"; ctx.textAlign="left";
    ctx.fillText(label,lx+26,20);
    lx+=ctx.measureText(label).width+52;
  });

  // Hover tooltip via mousemove
  canvas._chartData={idxs,tLabels,tInv,tPort,tNifty,PAD,cW,cH,xOf,yOf,fmtY,W,H,maxV,axisDates};
  canvas.onmousemove=function(e){
    const rect=canvas.getBoundingClientRect();
    const mx=e.clientX-rect.left;
    const d=canvas._chartData;
    const i=Math.round(((mx-d.PAD.l)/d.cW)*(d.idxs.length-1));
    if(i<0||i>=d.idxs.length) return;
    // Redraw
    buildGrowthChart._lastHover=i;
    // Vertical line
    ctx.clearRect(0,0,d.W,d.H);
    // Rebuild (simple: just re-call render parts, avoid full rebuild loop)
    buildGrowthChart._drawOnly(ctx,d);
    const x=d.xOf(i);
    ctx.strokeStyle="rgba(148,163,184,0.3)"; ctx.lineWidth=1; ctx.setLineDash([]);
    ctx.beginPath(); ctx.moveTo(x,d.PAD.t); ctx.lineTo(x,d.PAD.t+d.cH); ctx.stroke();
    // Tooltip box
    const rows=[];
    if(d.tInv[i]!=null) rows.push({color:"#4FC3F7",label:"Invested",val:d.tInv[i]});
    if(d.tPort[i]!=null) rows.push({color:"#4ADE80",label:"Portfolio",val:d.tPort[i]});
    if(d.tNifty&&d.tNifty[i]!=null) rows.push({color:"#FB923C",label:"Nifty50",val:d.tNifty[i]});
    if(!rows.length) return;
    const bw=170,bh=rows.length*20+32;
    let bx=x+10; if(bx+bw>d.W-10) bx=x-bw-10;
    const by=d.PAD.t+4;
    ctx.fillStyle="#0E1520"; ctx.strokeStyle="#18263A"; ctx.lineWidth=1;
    ctx.beginPath(); ctx.roundRect(bx,by,bw,bh,6); ctx.fill(); ctx.stroke();
    ctx.fillStyle="#D8E3EF"; ctx.font="11px DM Sans,sans-serif"; ctx.textAlign="left";
    ctx.fillText(d.tLabels[i],bx+10,by+16);
    rows.forEach(({color,label,val},ri)=>{
      ctx.fillStyle=color; ctx.fillText(label+":",bx+10,by+34+ri*20);
      ctx.fillStyle="#D8E3EF"; ctx.textAlign="right";
      ctx.fillText(d.fmtY(val),bx+bw-10,by+34+ri*20);
      ctx.textAlign="left";
    });
  };
  canvas.onmouseleave=function(){ buildGrowthChart._drawOnly(ctx,canvas._chartData); };

  // Store a minimal redraw fn
  buildGrowthChart._drawOnly=function(ctx,d){
    ctx.fillStyle="#090E18"; ctx.fillRect(0,0,d.W,d.H);
    ctx.strokeStyle="rgba(24,38,58,0.8)"; ctx.lineWidth=1;
    for(let i=0;i<=6;i++){
      const y=d.PAD.t+(d.cH/6)*i;
      ctx.beginPath(); ctx.moveTo(d.PAD.l,y); ctx.lineTo(d.PAD.l+d.cW,y); ctx.stroke();
      ctx.fillStyle="#40556A"; ctx.font="11px DM Mono,monospace"; ctx.textAlign="right";
      ctx.fillText(d.fmtY(d.maxV-(d.maxV/6)*i),d.PAD.l-6,y+4);
    }
    const xStep2=Math.max(1,Math.floor(d.idxs.length/10));
    ctx.fillStyle="#40556A"; ctx.font="11px DM Sans,sans-serif"; ctx.textAlign="center";
    d.tLabels.forEach((lbl,i)=>{ if(i%xStep2===0||i===d.tLabels.length-1) ctx.fillText(lbl,d.xOf(i),d.H-d.PAD.b+18); });
    drawLine(d.tInv,"#4FC3F7",true,false,true);
    if(d.tPort.some(v=>v!=null)) drawLine(d.tPort,"#4ADE80",false,false);
    if(d.tNifty&&d.tNifty.some(v=>v!=null)) drawLine(d.tNifty,"#FB923C",false,false);
    // Legend
    let lx2=d.PAD.l;
    legend.forEach(({color,dash,label})=>{
      ctx.strokeStyle=color; ctx.lineWidth=2; ctx.setLineDash(dash?[5,3]:[]);
      ctx.beginPath(); ctx.moveTo(lx2,16); ctx.lineTo(lx2+22,16); ctx.stroke(); ctx.setLineDash([]);
      ctx.fillStyle="#94A3B8"; ctx.font="12px DM Sans,sans-serif"; ctx.textAlign="left";
      ctx.fillText(label,lx2+26,20);
      lx2+=ctx.measureText(label).width+52;
    });
  };
  S.chartInstance = {destroy:()=>{ canvas.onmousemove=null; canvas.onmouseleave=null; }};
}

function get30DayValue(snaps){ if(!snaps.length)return null; const t=new Date(); t.setDate(t.getDate()-30); const ts=t.toISOString().slice(0,10); let best=null,bd=Infinity; snaps.forEach(s=>{const d=Math.abs(new Date(s.date)-new Date(ts))/864e5; if(d<=5&&d<bd){bd=d;best=s;}}); return best; }

function mfEntries(isin){ return S.mfHoldings[isin]||[]; }
function mfTotalUnits(isin){ return mfEntries(isin).reduce((s,e)=>s+e.units,0); }
function mfTotalInvested(isin){ return mfEntries(isin).reduce((s,e)=>s+e.amount,0); }
function mfAvgNav(isin){ const u=mfTotalUnits(isin); return u>0?mfTotalInvested(isin)/u:0; }
function mfCurrentValue(isin){
  const entries=mfEntries(isin); if(!entries.length) return null;
  const nav=S.mfNavs[isin]?.nav; if(!nav) return null;
  return mfTotalUnits(isin)*nav;
}
function mfPnL(isin){
  const cur=mfCurrentValue(isin); if(cur===null) return null;
  const inv=mfTotalInvested(isin); return cur-inv;
}
function mfPnLPct(isin){
  const pnl=mfPnL(isin); if(pnl===null) return null;
  const inv=mfTotalInvested(isin); return inv>0?(pnl/inv)*100:null;
}

function addMFEntry(isin, date, units, nav, amount){
  if(!S.mfHoldings[isin]) S.mfHoldings[isin]=[];
  S.mfHoldings[isin].push({
    date: date||new Date().toISOString().slice(0,10),
    units: parseFloat(units)||0,
    nav:   parseFloat(nav)||0,
    amount:parseFloat(amount)||(parseFloat(units)*parseFloat(nav))||0,
  });
  S.mfHoldings[isin].sort((a,b)=>a.date.localeCompare(b.date));
  saveMFHoldings(S.mfHoldings);
  render(); showToast("MF entry added ✓");
  fetchAMFINavs(); // always try — works without proxy via mfapi.in fallback
}

function deleteMFEntry(isin, idx){
  if(!S.mfHoldings[isin]) return;
  S.mfHoldings[isin].splice(idx,1);
  if(!S.mfHoldings[isin].length) delete S.mfHoldings[isin];
  saveMFHoldings(S.mfHoldings);

}

function deleteMFHolding(isin){

async function fetchAMFINavs(){
  if(!MF_PORTFOLIO.length) return;
  S.mfNavLoading=true; S.mfNavError=null;
  if(S.tab==="portfolio") render();

  const results = {};

  // ── Strategy 1: proxy /amfi-nav — proxy fetches NAVAll.txt server-side (no CORS issue) ──
  async function fetchViaProxy(){
    const base = S.proxyUrl.replace(/\/+$/,"");
    const isins = MF_PORTFOLIO.map(p=>p.isin).join(",");
    const r = await fetch(`${base}/amfi-nav?isins=${encodeURIComponent(isins)}`,
      {signal:AbortSignal.timeout(15000)});
    if(!r.ok) throw new Error("proxy /amfi-nav HTTP "+r.status);
    const data = await r.json();
    if(data.error) throw new Error(data.error);
    MF_PORTFOLIO.forEach(p=>{
      const entry = data[p.isin.toUpperCase()] || data[p.isin];
      if(entry?.nav) results[p.isin]={...entry, source:"amfi-proxy"};
    });
    if(!Object.keys(results).length) throw new Error("No ISINs matched in AMFI response");
  }

  // ── Strategy 2: mfapi.in by scheme code (direct, CORS-open) ──
  async function fetchBySchemeCode(schemeCode, p){
    const r=await fetch(`https://api.mfapi.in/mf/${schemeCode}`,
      {signal:AbortSignal.timeout(10000)});
    if(!r.ok) throw new Error("mfapi HTTP "+r.status);
    const d=await r.json();
    const nav=parseFloat(d?.data?.[0]?.nav);
    if(!nav||isNaN(nav)) throw new Error("Bad NAV in mfapi response");
    results[p.isin]={nav, date:d?.data?.[0]?.date||"", schemeName:d.meta?.scheme_name||p.instrument, source:"mfapi"};
  }

  // ── Strategy 3: mfapi.in search by name ──
  async function searchMfapi(query, p){
    const r=await fetch(`https://api.mfapi.in/mf/search?q=${encodeURIComponent(query)}`,
      {signal:AbortSignal.timeout(10000)});
    if(!r.ok) throw new Error("mfapi search HTTP "+r.status);
    const schemes=await r.json();
    if(!schemes?.length) throw new Error("No results for: "+query);
    const match=schemes.find(s=>{ const n=(s.schemeName||"").toLowerCase(); return n.includes("direct")&&(n.includes("growth")||n.includes(" gr")); })||schemes[0];
    await fetchBySchemeCode(match.schemeCode, p);
  }

  // Try proxy first (most reliable — single request, official AMFI data)
  if(S.proxyActive){
    try{ await fetchViaProxy(); }
    catch(e){ console.warn("Proxy AMFI failed:", e.message); }
  }

  // For any still-missing MF, try mfapi.in directly
  await Promise.all(MF_PORTFOLIO.map(async p=>{
    if(results[p.isin]) return;
    try{
      if(p.mfSchemeCode){
        await fetchBySchemeCode(p.mfSchemeCode, p);
      } else {
        // Use explicit search query if set, else clean up instrument name (strip em-dashes etc)
        const q = p.mfSearchQuery || p.instrument.replace(/[–—]/g,"-").replace(/\s+/g," ").trim();
        await searchMfapi(q, p);
      }
    } catch(e){
      console.warn("mfapi failed for",p.ticker,":",e.message);
      S.mfNavError=(S.mfNavError?S.mfNavError+"; ":"")+p.ticker+": "+e.message;
    }
  }));

  const found=Object.keys(results).length;
  if(found){
    S.mfNavs={...S.mfNavs,...results};
    Object.entries(results).forEach(([isin,v])=>{
      const p=MF_PORTFOLIO.find(x=>x.isin===isin);
      console.log(`✓ NAV [${p?.ticker}] ₹${v.nav} (${v.date}) via ${v.source}`);
    });
    showToast(`NAV: ${Object.entries(results).map(([isin,v])=>{
      const p=MF_PORTFOLIO.find(x=>x.isin===isin);
      return (p?.ticker||"")+" ₹"+v.nav.toFixed(2);
    }).join(" · ")} ✓`);
  } else {
    if(!S.mfNavError) S.mfNavError="NAV fetch failed — check proxy connection";
    showToast("NAV fetch failed — "+S.mfNavError,"error");
  }
  S.mfNavLoading=false;
  if(S.tab==="portfolio") render();
}

async function lookupSecurityIds(){
  if(!S.proxyActive){ showToast("Enable proxy first","error"); return; }
  const etfs = ETF_PORTFOLIO.filter(p=>!p.securityId);
  if(!etfs.length){ showToast("All ETF security IDs already known ✓"); return; }

  showToast(`Looking up ${etfs.length} security ID(s)…`);
  const symbols = etfs.map(p=>p.ticker).join(",");

  try {
    const base = S.proxyUrl.replace(/\/+$/,"");
    const r1 = await fetch(`${base}/scrip-lookup?symbols=${encodeURIComponent(symbols)}`);
    const d1 = await r1.json().catch(()=>({}));
    let found = 0;

    ETF_PORTFOLIO.forEach(p=>{
      const hit = d1[p.ticker.toUpperCase()];
      if(hit?.securityId){ p.securityId=hit.securityId; found++; }
    });

    const stillMissing = ETF_PORTFOLIO.filter(p=>!p.securityId);
    if(stillMissing.length){
      const isinStr = stillMissing.map(p=>p.isin).join(",");
      const r2 = await fetch(`${base}/scrip-lookup?isins=${encodeURIComponent(isinStr)}`);
      const d2 = await r2.json().catch(()=>({}));
      stillMissing.forEach(p=>{
        const hit = d2[p.isin.toUpperCase()];
        if(hit?.securityId){ p.securityId=hit.securityId; found++; }
      });
    }

    const still = ETF_PORTFOLIO.filter(p=>!p.securityId).map(p=>p.ticker);
    if(found){
      showToast(`✓ Found ${found} security ID(s): ${ETF_PORTFOLIO.filter(p=>p.securityId).map(p=>p.ticker+"="+p.securityId).join(", ")}`);
    }
    if(still.length){
      showToast(`⚠️ Not found in scrip master: ${still.join(", ")} — check ticker spelling`, "error");
    }
  } catch(e){
    showToast("Scrip lookup failed: "+e.message,"error");
  }
  render();
}

/* ══════════════════════════════════════════════════
   REQUEST LOG
══════════════════════════════════════════════════ */
function addReqLog(method,path,status,ms,detail){
  const t=new Date();
  S.reqLog.unshift({
    id:t.getTime(), ts:`${String(t.getHours()).padStart(2,'0')}:${String(t.getMinutes()).padStart(2,'0')}:${String(t.getSeconds()).padStart(2,'0')}`,
    method,path,status,ms,detail
  });
  if(S.reqLog.length>50)S.reqLog.pop();
  repaintReqLog();
}
function repaintReqLog(){
  const c=el("req-log-content");
  if(!c)return;
  if(!S.reqLog.length){c.innerHTML=`<div style="color:#40556A;font-size:12px;padding:8px 0">No requests yet — connect or test proxy to see activity.</div>`;return;}
  c.innerHTML=S.reqLog.map(r=>{
    const isOk=r.status&&(r.status.startsWith("2")||r.status.startsWith("4"));
    const isErr=r.status&&(r.status.startsWith("5")||r.status==="ERROR"||r.status==="CORS");
    const sc=isErr?"#F87171":isOk?"#4ADE80":"#60778A";
    const mc=r.method==="GET"?"#4ADE80":"#4FC3F7";
    const msLabel=r.ms?`<span style="color:#40556A">${r.ms}ms</span>`:"";
    return `<div class="req-row">
      <span style="color:#40556A">${r.ts}</span>
      <span style="color:${mc};font-weight:700">${r.method}</span>
      <span style="color:#94A3B8;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${r.path}">${r.path}</span>
      <span style="color:${sc};text-align:right">${r.status||"…"} ${msLabel}</span>
    </div>${r.detail?`<div class="req-detail">↳ ${r.detail.slice(0,200)}</div>`:""}`;
  }).join("");
}

/* ══════════════════════════════════════════════════
   CORE API WRAPPER
══════════════════════════════════════════════════ */
async function dhanApi(method, path, body){
  if(!S.proxyActive){
    const errMsg = "Proxy not active — enable proxy in Settings first";
    addReqLog(method, path, "NO_PROXY", 0, errMsg);
    return {ok:false, status:0, data:null, error:errMsg};
  }

  const base = S.proxyUrl.replace(/\/+$/,"");
  const url  = base + path;
  const t0   = Date.now();
  const reqId = t0;

  S.reqLog.unshift({id:reqId, ts:new Date().toLocaleTimeString('en-GB',{hour12:false}), method, path, status:"…", ms:0, detail:null});
  if(S.reqLog.length>50)S.reqLog.pop();
  repaintReqLog();

  const headers = {
    "Content-Type": "application/json",
    "Accept":       "application/json",
    "access-token": S.apiKey || "",
    "dhanClientId": S.clientId || "",
    "X-Dhan-Host":  dhanHost(),
  };

  try {
    const res  = await fetch(url, {
      method,
      headers,
      body: body ? JSON.stringify(body) : undefined
    });

    const text = await res.text();
    const ms   = Date.now()-t0;
    let json=null, parseErr=null;
    try { json=JSON.parse(text); } catch(e){ parseErr=e.message; }

    const entry=S.reqLog.find(r=>r.id===reqId);
    if(entry){
      entry.status=String(res.status);
      entry.ms=ms;
      if(!res.ok||parseErr){
        entry.detail = json?.errorMessage || json?.message ||
          (parseErr?`Non-JSON: "${text.slice(0,100)}"`:null);
      }
    }
    repaintReqLog();

    if(!res.ok){
      const errMsg=json?.errorMessage||json?.message||json?.errorCode||(parseErr?`Non-JSON response: ${text.slice(0,80)}`:`HTTP ${res.status}`);
      return{ok:false,status:res.status,data:json,error:errMsg};
    }
    if(parseErr){
      return{ok:false,status:res.status,data:null,error:`Response was not JSON. Got: "${text.slice(0,80)}"`};
    }
    return{ok:true,status:res.status,data:json};

  } catch(err){
    const ms=Date.now()-t0;
    const isCors=err.message.includes("Failed to fetch")||err.message.includes("NetworkError");
    const entry=S.reqLog.find(r=>r.id===reqId);
    if(entry){entry.status=isCors?"CORS":"ERROR";entry.ms=ms;entry.detail=err.message;}
    repaintReqLog();
    return{ok:false,status:0,data:null,
      error:isCors?"Proxy not reachable — is dhan-proxy.js running? Run: node dhan-proxy.js":err.message};
  }
}

  if(!Array.isArray(allH)){
    S.portfolioError = "Unexpected holdings response: "+JSON.stringify(hR.data).slice(0,80);
    S.portfolioLoading=false; render(); return;
  }

  function matchHolding(h){
    const sym = (h.tradingSymbol||"").toUpperCase().trim();
    const isn = (h.isin||"").toUpperCase().trim();
    return SYMBOL_MAP[sym] || ISIN_MAP[isn] || null;
  }
  const matched=[], unmatched=[];
  allH.forEach(h=>{ const m=matchHolding(h); if(m) matched.push({h,meta:m}); else unmatched.push(h); });
  addReqLog("PARSE","/v2/holdings",`${allH.length} total`,0,
    `matched=${matched.length} symbols=[${allH.map(h=>(h.tradingSymbol||"?").slice(0,10)).join(",")}]`);

  // ── STEP 2: LTP ───────────────────────────────────────────────────────────
  const toSeg={"NSE":"NSE_EQ","BSE":"BSE_EQ","NSE_EQ":"NSE_EQ","BSE_EQ":"BSE_EQ","ALL":"NSE_EQ"};
  let ltpMap={};
  if(matched.length){
    const ltpPay={};
    matched.forEach(({h})=>{
      const seg=toSeg[(h.exchange||"NSE").toUpperCase()]||"NSE_EQ";
      if(!ltpPay[seg]) ltpPay[seg]=[];
      if(!ltpPay[seg].includes(String(h.securityId))) ltpPay[seg].push(String(h.securityId));
    });
    const lR=await dhanApi("POST","/v2/marketfeed/ltp",ltpPay);
    if(lR.ok&&lR.data){
      const segs=lR.data?.data||lR.data;
      Object.values(segs).forEach(seg=>{
        if(typeof seg!=="object"||!seg) return;
        Object.entries(seg).forEach(([id,info])=>{
          ltpMap[String(id)]=parseFloat(info?.last_price??info?.lastTradedPrice??info?.ltp??0)||0;
        });
      });
    }
  }

  // ── STEP 3: Tradebook (if trackingStartDate set) ──────────────────────────
  let tradeMap = null;

  if(S.trackingStartDate && matched.length){
    const today = new Date().toISOString().slice(0,10);
    let page=0, allTrades=[];
    while(page<30){
      const tR=await dhanApi("GET",`/v2/trades/${S.trackingStartDate}/${today}/${page}`);
      if(!tR.ok) break;
      let rows=tR.data;
      if(!Array.isArray(rows)) rows=rows?.data||rows?.trades||[];
      if(!Array.isArray(rows)||!rows.length) break;
      allTrades=allTrades.concat(rows);
      if(rows.length<50) break;
      page++;
    }

    const buys = allTrades.filter(t=>{
      const tx=(t.transactionType||t.trxnType||t.txnType||t.type||"").toUpperCase();
      return tx==="BUY" || tx==="B";
    });

    const secIdMap={};
    matched.forEach(({h,meta})=>{
      if(h.securityId) secIdMap[String(h.securityId)]=meta;
    });

    const ALIASES = {
      "MON100":     ["MON100","MON100-EQ","MON100BE","MOTOSWALD","MOTILALOSWNN","MOFN100"],
      "GOLDBEES":   ["GOLDBEES","NIPGOLDETF","GOLD BEES","NIPPON GOLD","GOLDIETF"],
      "SILVERBEES": ["SILVERBEES","NIPSILVETF","SILVER BEES","NIPPON SILVER","SILVERIETF"],
      "NIFTYBEES":  ["NIFTYBEES","NIFTY BEES","NIPNIFTYETF","NIFTIETF"],
    };
    // ISIN overrides — map ISINs that don't resolve via symbol/securityId
    const ISIN_OVERRIDES = {
      // ISINs that are real instruments but not in ETF_PORTFOLIO — suppress warning, log info
      "INF109KC1NT3": {ticker:"ICICIGOLD",  name:"ICICI Prudential Gold ETF",    note:"Not tracked — add to ETF_PORTFOLIO to include"},
      "INF174KA1ZE1": {ticker:"NV20",       name:"Kotak Nifty 50 Value 20 ETF",  note:"New ISIN since 27-Feb-2026 (sub-division ₹10→₹1). Not tracked — add to ETF_PORTFOLIO to include"},
    };
    const ALIAS_MAP={};
    Object.entries(ALIASES).forEach(([ticker,aliases])=>{
      aliases.forEach(a=>{ ALIAS_MAP[a.toUpperCase()]=SYMBOL_MAP[ticker]; });
    });

    function resolveTradeToMeta(t){
      const rawSym  = (t.tradingSymbol||t.symbol||t.scripName||t.customSymbol||"").toUpperCase().trim();
      const cleanSym= rawSym.replace(/[-_ ]?(EQ|BE|N1|N2|N3|N4|N5|ETF)$/,"").trim();
      const isn     = (t.isin||t.isinCode||"").toUpperCase().trim();
      const secId   = String(t.securityId||t.scripId||t.scripCode||t.exchangeToken||"");

      return SYMBOL_MAP[rawSym]
          || SYMBOL_MAP[cleanSym]
          || ALIAS_MAP[rawSym]
          || ALIAS_MAP[cleanSym]
          || (isn && ISIN_MAP[isn])
          || (secId && secId!=="undefined" && secIdMap[secId])
          || null;
    }

    const tradeKeys=[...new Set(buys.map(t=>{
      const s=(t.tradingSymbol||t.symbol||"?").toUpperCase();
      const sec=t.securityId||t.scripId||"";
      const isn=t.isin||"";
      return [s, sec&&`id:${sec}`, isn&&`isin:${isn}`].filter(Boolean).join(" ");
    }))];
    addReqLog("PARSE",`/v2/trades (${S.trackingStartDate}→${today})`,
      `${allTrades.length} trades / ${buys.length} buys`, 0,
      `pages=${page+1} | keys: [${tradeKeys.join("] [")}]`);

    tradeMap={};
    const unresolved=new Set();
    buys.forEach(t=>{
      // ─────────────────────────────────────────────────────────────────────
      // FIX: Do NOT filter by "INF" ISIN prefix.
      // All Indian ETF ISINs also start with "INF" (e.g. NIFTYBEES=INF204KB13I2).
      // The old check `if(tIsin.startsWith("INF")) return` was silently dropping
      // every single ETF trade. Instead, skip only ISINs that exactly match
      // a known MF in our portfolio (which truly can't be bought via stock API).
      // ─────────────────────────────────────────────────────────────────────
      const tIsin = (t.isin||t.isinCode||"").toUpperCase().trim();
      const tSym  = (t.tradingSymbol||t.symbol||"").toUpperCase().trim();

      // Skip if this ISIN belongs to one of our MF holdings
      const isMFIsin = MF_PORTFOLIO.some(p => p.isin.toUpperCase() === tIsin);
      if(isMFIsin) return;

      // Skip records with no identifiable symbol, no ISIN, and securityId=0
      if(String(t.securityId||"0")==="0" && !tSym && !tIsin) return;

      const meta=resolveTradeToMeta(t);
      if(!meta){
        // Check if this is a known-but-untracked instrument (ISIN_OVERRIDES)
        const override = ISIN_OVERRIDES[tIsin];
        if(override){
          // Known instrument not in portfolio — skip gracefully with console note
          console.info(`Trade skipped (not in portfolio): ${tIsin} = ${override.ticker} — ${override.note||""}`);
          return;
        }
        unresolved.add(tSym||tIsin||"?"); return;
      }

      const qty   = parseFloat(t.tradedQuantity||t.fillQty||t.executedQty||t.quantity||0);
      const price = parseFloat(t.tradedPrice||t.fillPrice||t.avgPrice||t.price||0);
      if(!qty||!price) return;

      const rawDate = t.exchangeTime||t.createTime||t.tradeDate||t.orderDate||"";
      const tradeDate = rawDate
        ? (rawDate.includes("T") ? rawDate.slice(0,10) : rawDate.slice(0,10))
        : "";

      if(!tradeMap[meta.ticker])
        tradeMap[meta.ticker]={qty:0, invested:0, count:0, rawSymbol:"", trades:[]};

      tradeMap[meta.ticker].qty      += qty;
      tradeMap[meta.ticker].invested += qty*price;
      tradeMap[meta.ticker].count++;
      tradeMap[meta.ticker].rawSymbol = (t.tradingSymbol||"").toUpperCase();
      tradeMap[meta.ticker].trades.push({date:tradeDate, qty, price, amount:qty*price});
    });

    Object.values(tradeMap).forEach(td=>{
      td.trades.sort((a,b)=>a.date.localeCompare(b.date));
    });

    if(unresolved.size){
      addReqLog("WARN","trades: unresolved",`[${[...unresolved].join(", ")}]`,0,
        "Check Settings → Diagnostics for symbol/id — add alias to ALIASES map if needed");
    }
  }

  // ── STEP 4: Build etfHoldings ─────────────────────────────────────────────
  S.etfHoldings = matched.map(({h, meta})=>{
    const ltp = ltpMap[String(h.securityId)]
             || parseFloat(h.lastTradedPrice||h.ltp||0)
             || parseFloat(h.avgCostPrice)||0;

    const portEntry=ETF_PORTFOLIO.find(p=>
      p.ticker.toUpperCase()===(h.tradingSymbol||"").toUpperCase()||
      p.isin.toUpperCase()===(h.isin||"").toUpperCase());
    if(portEntry&&!portEntry.securityId&&h.securityId) portEntry.securityId=String(h.securityId);

    if(tradeMap&&tradeMap[meta.ticker]){
      const td = tradeMap[meta.ticker];
      const heldQty    = parseInt(h.totalQty||h.dpQty||0);
      const tradeQty   = td.qty;
      const avgCost    = tradeQty>0 ? td.invested/tradeQty : 0;
      const inv        = td.invested;
      const cur        = tradeQty * ltp;
      return{
        ...meta,...h, ticker:meta.ticker,
        qty: tradeQty,
        heldQty,
        ltp, avgCostPrice:avgCost,
        investedValue:inv, currentValue:cur,
        unrealizedPnL:cur-inv,
        pnlPct:inv>0?((cur-inv)/inv)*100:0,
        t1Qty:parseInt(h.t1Qty||0), availableQty:parseInt(h.availableQty||heldQty),
        fromTrades:true, tradeCount:td.count, tradeSymbols:td.rawSymbol||"",
        trades: td.trades||[],
      };
    } else if(tradeMap){
      const heldQty = parseInt(h.totalQty||h.dpQty||0);
      return{
        ...meta,...h, ticker:meta.ticker,
        qty:0, heldQty,
        ltp, avgCostPrice:0,
        investedValue:0, currentValue:0,
        unrealizedPnL:0, pnlPct:0,
        t1Qty:0, availableQty:parseInt(h.availableQty||heldQty),
        fromTrades:true, tradeCount:0, tradeSymbols:"", trades:[],
        notTracked:true,
      };
    } else {
      const qty=parseInt(h.totalQty||h.dpQty||0);
      const avgCost=parseFloat(h.avgCostPrice)||0;
      const inv=qty*avgCost, cur=qty*ltp;
      return{
        ...meta,...h, ticker:meta.ticker,
        qty, ltp, avgCostPrice:avgCost,
        investedValue:inv, currentValue:cur,
        unrealizedPnL:cur-inv,
        pnlPct:inv>0?((cur-inv)/inv)*100:0,
        t1Qty:parseInt(h.t1Qty||0), availableQty:parseInt(h.availableQty||qty),
        fromTrades:false, tradeCount:0, trades:[],
      };
    }
  });

  S.unmatchedHoldings = unmatched.map(h=>({
    ...h,
    qty:parseInt(h.totalQty||h.dpQty||0),
    avgCostPrice:parseFloat(h.avgCostPrice)||0,
    ltp:parseFloat(h.lastTradedPrice||h.ltp||0)||parseFloat(h.avgCostPrice)||0,
  }));
  S.lastRefreshed=new Date();

  // ETF-only P&L snapshot: store etfValue (qty×LTP) and etfCost (qty×avgCostPrice) separately.
  // Daily ETF P&L = Δ(etfValue - etfCost) between consecutive days.
  // New buys raise both value and cost equally on the same day → no artificial profit.
  const etfSnapValue = S.etfHoldings.reduce((s,h)=>s+(h.currentValue||0),0);
  const etfSnapCost  = S.etfHoldings.reduce((s,h)=>s+(h.investedValue||0),0);
  const etfUnrealized = etfSnapValue - etfSnapCost;

  const updated=saveSnapshot(totalCurrent(), 0, etfSnapValue, etfSnapCost, etfUnrealized);
  S.snapshots=updated; S.snap30=get30DayValue(updated);
  if(S.snap30&&S.snap30.value>0){
    const p=((totalCurrent()-S.snap30.value)/S.snap30.value)*100;
    S.thirtyDayPnLPct=parseFloat(p.toFixed(1));
    S.lossPercent=Math.min(0,S.thirtyDayPnLPct);
  } else {S.thirtyDayPnLPct=0;S.lossPercent=0;}

  const mode=S.trackingStartDate?`trades from ${S.trackingStartDate}`:"lifetime avg";
  showToast(`${S.etfHoldings.filter(h=>h.fromTrades!==undefined||true).length}/${ETF_PORTFOLIO.length} ETFs synced · ${mode} ✓`);
  S.portfolioLoading=false; render();
}

async function fetchChargesForOrder(orderId){
  const today=new Date().toISOString().slice(0,10);
  const r=await dhanApi("GET",`/v2/trades/${today}/${today}/0`);
  if(!r.ok||!Array.isArray(r.data))return null;
  const trade=r.data.find(t=>String(t.orderId)===String(orderId));
  if(!trade)return null;
  const stt=+trade.stt||0,sebi=+trade.sebiTax||0,brok=+trade.brokerageCharges||0,
        gst=+trade.serviceTax||0,exch=+trade.exchangeTransactionCharges||0,stamp=+trade.stampDuty||0;
  return{stt,sebi,brokerage:brok,gst,exchCharge:exch,stamp,total:stt+sebi+brok+gst+exch+stamp,
         tradedPrice:trade.tradedPrice,tradedQty:trade.tradedQuantity,
         exchangeTradeId:trade.exchangeTradeId,exchangeTime:trade.exchangeTime};
}

function isModalLocked(){ return S.om.phase==="placing"||S.om.phase==="polling"; }

function openOrderModal(p){
  if(!S.connected){showToast("Connect first","error");return;}
  if(!S.proxyActive){showToast("Enable proxy first","error");return;}
  const amt=allocatedAmounts().find(a=>a.id===p.id)?.allocated||0;
  S.om={open:true,p,phase:"idle",orderId:null,message:"",charges:null,
    tradedPrice:null,tradedQty:null,amount:amt,pollCount:0,pollTimer:null};
  el("order-modal").style.display="flex";
  paintOrderModal();
}

function closeOrderModal(){
  if(isModalLocked())return;
  if(S.om.pollTimer)clearTimeout(S.om.pollTimer);
  S.om.open=false; S.om.phase="idle";
  el("order-modal").style.display="none";
}

function paintOrderModal(){
  const om=S.om; if(!om.p)return;
  const p=om.p, locked=isModalLocked();
  const envLabel=S.dhanEnv==="sandbox"
    ?`<span class="badge badge-amber" style="font-size:10px">🧪 SANDBOX</span>`
    :`<span class="badge badge-green" style="font-size:10px">🏦 PRODUCTION</span>`;

  el("om-title").textContent=`Place Order — ${p.ticker}`;
  el("om-env-badge").innerHTML=`${envLabel} · Direct API · ${dhanHost()}`;
  el("om-icon").textContent=p.icon||"📊";
  el("om-name").textContent=p.instrument;
  el("om-ticker").textContent=p.ticker;
  el("om-amt").textContent=fmtC(om.amount);

  // Show live qty calculation
  const holding = S.etfHoldings.find(h=>h.isin===p.isin||h.ticker===p.ticker);
  const ltp = holding?.ltp||0;
  const qty = ltp>0 ? Math.max(1,Math.floor(om.amount/ltp)) : null;
  const omQtyEl = el("om-qty");
  if(omQtyEl){
    omQtyEl.innerHTML = qty
      ? `<span style="font-size:20px;font-weight:700;color:#FCD34D">${qty} units</span>
         <span style="font-size:12px;color:#60778A;margin-left:8px">@ ${fmtC(ltp)} LTP · ≈${fmtC(qty*ltp)}</span>`
      : `<span style="color:#F87171;font-size:12px">LTP unavailable — connect portfolio first</span>`;
  }

  const xbtn=el("om-x");
  xbtn.disabled=locked; xbtn.style.opacity=locked?"0.2":"1";

  let statusHtml="";
  if(om.phase==="idle"){
    statusHtml=`<div class="om-status om-idle">Ready to place a MARKET BUY order. Confirm to send to ${dhanHost()}.</div>`;
  } else if(om.phase==="placing"){
    statusHtml=`<div class="om-status om-placing" style="display:flex;align-items:center;gap:12px">
      <span class="spin" style="font-size:22px">⟳</span>
      <div><div style="font-weight:600">Placing order…</div><div style="font-size:12px;margin-top:2px;color:#60778A">Sending to Dhan API — please wait</div></div>
    </div>`;
  } else if(om.phase==="polling"){
    statusHtml=`<div class="om-status om-polling">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px">
        <span class="spin" style="font-size:22px">⟳</span>
        <div>
          <div style="font-weight:700">Waiting for exchange confirmation…</div>
          <div style="font-size:12px;margin-top:2px">Order ID <span class="mono">${om.orderId}</span> · Poll ${om.pollCount}/24</div>
        </div>
      </div>
      <div style="padding:10px 12px;background:rgba(0,0,0,.3);border-radius:8px;font-size:12px">
        ⚠️ <strong>Do not close this window.</strong> Waiting for TRADED or REJECTED status.
      </div>
    </div>`;
  } else if(om.phase==="done"){
    const c=om.charges;
    statusHtml=`<div class="om-status om-done">
      <div style="font-size:16px;font-weight:700;margin-bottom:10px">✅ Order Executed</div>
      ${om.tradedPrice?`<div class="mono" style="margin-bottom:10px">Filled @ ${fmtC(om.tradedPrice)} × ${om.tradedQty||"?"} units</div>`:""}
      ${c?`<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;font-size:12px">
        ${[["STT",c.stt],["Exchange",c.exchCharge],["SEBI",c.sebi],["Stamp",c.stamp],["GST",c.gst],["Brokerage",c.brokerage]].map(([l,v])=>`
          <div style="background:#053D2F50;border-radius:6px;padding:6px 8px">
            <div style="color:#2a7a5a;font-size:10px;margin-bottom:2px">${l}</div>
            <div class="mono" style="color:${v===0?"#6EE7B7":"#34d399"};font-size:12px">${v===0?"Free":"−"+fmtC(v)}</div>
          </div>`).join("")}
      </div>
      <div style="margin-top:10px;padding-top:10px;border-top:1px solid rgba(52,211,153,.2);font-size:12px">
        Total charges: <span class="mono" style="color:#6EE7B7">${fmtC(c.total)}</span>
      </div>`:`<div style="font-size:12px;opacity:.7">Fetching charges from tradebook…</div>`}
    </div>`;
  } else if(om.phase==="rejected"){
    statusHtml=`<div class="om-status om-reject"><div style="font-weight:700;margin-bottom:6px">❌ Order Rejected</div><div>${om.message||"Rejected by exchange or OMS"}</div></div>`;
  } else if(om.phase==="error"){
    statusHtml=`<div class="om-status om-error"><div style="font-weight:700;margin-bottom:6px">⚠️ Order Failed</div><div>${om.message}</div><div style="font-size:12px;margin-top:8px;color:#F87171">Check proxy connection, credentials, and market hours.</div></div>`;
  } else if(om.phase==="timeout"){
    statusHtml=`<div class="om-status om-timeout"><div style="font-weight:700;margin-bottom:6px">⏱️ Confirmation Timeout</div><div>Order <span class="mono">${om.orderId}</span> was placed but status confirmation timed out.</div><div style="font-size:12px;margin-top:6px">Check the Dhan app — it may be queued as AMO.</div></div>`;
  }
  el("om-status").innerHTML=statusHtml;

  let footHtml="";
  if(om.phase==="idle"){
    footHtml=`<button class="btn btn-ghost btn-sm" onclick="closeOrderModal()">Cancel</button>
      <button class="btn btn-amber" id="om-confirm" onclick="executeOrder()">⚡ Confirm — Place Order</button>`;
  } else if(locked){
    footHtml=`<span style="font-size:12px;color:#FCD34D">⚠️ Order in progress — please wait…</span>`;
  } else if(om.phase==="done"){
    footHtml=`<button class="btn btn-ghost btn-sm" onclick="closeOrderModal()">✓ Close</button>
      <button class="btn btn-blue btn-sm" onclick="closeOrderModal();fetchPortfolio(false)">⟳ Refresh Portfolio</button>`;
  } else if(om.phase==="timeout"){
    footHtml=`<button class="btn btn-ghost btn-sm" onclick="closeOrderModal()">Close</button>
      <button class="btn btn-blue btn-sm" onclick="closeOrderModal();fetchTodayOrders()">⟳ Sync Orders</button>`;
  } else {
    footHtml=`<button class="btn btn-ghost btn-sm" onclick="closeOrderModal()">Dismiss</button>`;
  }
  el("om-footer").innerHTML=footHtml;
}

async function executeOrder(){
  const om=S.om; if(!om.p)return;
  const p=om.p;
  om.phase="placing"; paintOrderModal();

  // Calculate qty from allocated amount ÷ LTP
  const holding = S.etfHoldings.find(h=>h.isin===p.isin||h.ticker===p.ticker);
  const ltp = holding?.ltp || 0;
  const qty = ltp>0 ? Math.max(1, Math.floor(om.amount / ltp)) : 1;
  if(ltp<=0) console.warn("LTP not available for",p.ticker,"— defaulting qty to 1");

  console.log(`Order: ${p.ticker} | amount=₹${om.amount} | ltp=₹${ltp} | qty=${qty}`);

  const r=await dhanApi("POST","/v2/orders",{
    dhanClientId:S.clientId, transactionType:"BUY", exchangeSegment:"NSE_EQ",
    productType:"CNC", orderType:"MARKET", validity:"DAY",
    tradingSymbol:p.ticker,
    securityId: p.securityId ||
                (S.etfHoldings.find(h=>h.isin===p.isin)?.securityId) ||
                p.isin,
    quantity:qty, price:0
  });

  if(!r.ok){
    om.phase="error"; om.message=r.error||`HTTP ${r.status}`;
    paintOrderModal(); return;
  }
  const orderId=r.data?.orderId;
  if(!orderId){
    om.phase="error"; om.message="No orderId in response: "+JSON.stringify(r.data).slice(0,80);
    paintOrderModal(); return;
  }

  om.orderId=orderId; om.phase="polling"; om.pollCount=0;
  paintOrderModal();

  const OK_STATUSES  =["TRADED","PART_TRADED","TRANSIT","EXECUTED","COMPLETE","FILLED","CONFIRMED"];
  const BAD_STATUSES =["REJECTED","CANCELLED","EXPIRED","FAILED"];

  const poll=async()=>{
    om.pollCount++;
    if(om.pollCount>24){om.phase="timeout";paintOrderModal();return;}
    const oR=await dhanApi("GET","/v2/orders");
    if(oR.ok&&Array.isArray(oR.data)){
      const ord=oR.data.find(o=>String(o.orderId)===String(orderId));
      if(ord){
        const st=(ord.orderStatus||"").toUpperCase();
        if(OK_STATUSES.includes(st)){
          om.phase="done";
          om.tradedPrice=parseFloat(ord.avgTradedPrice||ord.averageTradedPrice||0)||null;
          om.tradedQty  =parseInt(ord.filledQty||ord.tradedQuantity||1);
          paintOrderModal();
          S.orders.unshift({id:orderId,instrument:p.instrument,ticker:p.ticker,amount:om.amount,
            time:new Date().toLocaleTimeString(),status:"EXECUTED",color:p.color,icon:p.icon,
            charges:null,chargesLoading:true,tradedPrice:om.tradedPrice,tradedQty:om.tradedQty});
          showToast(`${p.ticker} ✓ executed — fetching charges…`);
          (async()=>{
            let ch=null;
            for(let a=0;a<7;a++){await new Promise(r=>setTimeout(r,a===0?3000:2500));ch=await fetchChargesForOrder(orderId);if(ch)break;}
            const idx=S.orders.findIndex(o=>o.id===orderId);
            if(idx!==-1){S.orders[idx].charges=ch;S.orders[idx].chargesLoading=false;if(ch){S.orders[idx].tradedPrice=ch.tradedPrice;S.orders[idx].tradedQty=ch.tradedQty;}}
            om.charges=ch; paintOrderModal();
            if(S.tab==="execute")render();
          })();
          return;
        }
        if(BAD_STATUSES.includes(st)){
          om.phase="rejected";
          om.message=ord.omsErrorDescription||ord.remarks||ord.errorDescription||st;
          paintOrderModal(); return;
        }
      }
    }
    om.pollTimer=setTimeout(poll,2200);
    paintOrderModal();
  };
  setTimeout(poll,1500);
}

async function fetchFunds(){
  if(!S.connected||!S.proxyActive){showToast("Connect first","error");return;}
  S.fundsLoading=true; S.fundsError=null;
  if(S.tab==="execute") render();
  const r = await dhanApi("GET","/v2/fundlimit");
  if(r.ok){
    // Dhan fundlimit returns: availabelBalance, withdrawableBalance, transferableBalance,
    // utiliziedAmount, blockedPayoutAmount, ...
    const d = r.data;
    S.funds = {
      available:      parseFloat(d.availabelBalance    ?? d.availableBalance    ?? 0),
      withdrawable:   parseFloat(d.withdrawableBalance ?? 0),
      utilized:       parseFloat(d.utiliziedAmount     ?? d.utilizedAmount      ?? 0),
      blocked:        parseFloat(d.blockedPayoutAmount ?? 0),
      raw: d,
    };
    showToast("Funds updated ✓");
  } else {
    S.fundsError = r.error || "Failed to fetch funds";
    showToast("Funds fetch failed: "+S.fundsError,"error");
  }
  S.fundsLoading=false;
  if(S.tab==="execute") render();
}

          </div>
          <div>
            <label class="inp-label">Client ID</label>
            <input class="inp" type="text" placeholder="Your Dhan Client ID" value="${S.clientId}"
              oninput="S.clientId=this.value;safeLs.set('dhan_client_id',this.value)">
          </div>
          <div>
            <label class="inp-label">Access Token (JWT)</label>
            <input class="inp" type="password" placeholder="Paste your access token" value="${S.apiKey}"
              oninput="S.apiKey=this.value;safeLs.set('dhan_api_key',this.value)">
          </div>
          <div class="btn-row">
            <button class="btn btn-blue" style="flex:1;justify-content:center" onclick="connectDhan()">
              ${S.connected?"✓ Reconnect":"Connect to Dhan"}
            </button>
            <button class="btn btn-ghost" onclick="window.open('https://my.dhan.co','_blank')">🔗 Portal</button>
          </div>
          <button class="btn btn-sm" style="width:100%;justify-content:center;background:linear-gradient(135deg,#312E81,#4338CA);color:#C7D2FE;border:none"
            onclick="renewToken()" ${S.renewingToken?"disabled":""}>
            ${S.renewingToken?`<span class="spin">⟳</span> Renewing…`:"⟳ Auto-Renew Token"}
          </button>
          ${S.connected?`<div style="padding:12px;background:#053D2F30;border-radius:10px;border:1px solid #059669;font-size:13px;color:#6EE7B7">✓ Connected</div>`:""}
        </div>
      </div>
      <div class="card" style="border-color:${S.proxyActive?"#6366F1":"#18263A"}">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
          <div class="section-title" style="margin-bottom:0">Local CORS Proxy</div>
          ${S.proxyActive?`<span class="badge badge-purple">Active</span>`:`<span class="badge badge-dim">Inactive</span>`}
        </div>
        <div class="gap-form">
          <div>
            <label class="inp-label">Proxy URL</label>
            <div style="display:flex;gap:8px;align-items:center">
              <input class="inp" type="text" placeholder="http://localhost:8080" value="${S.proxyUrl}"
                oninput="S.proxyUrl=this.value;safeLs.set('proxy_url',this.value)" style="flex:1">
              <button class="btn btn-ghost btn-sm" style="white-space:nowrap;flex-shrink:0" title="Reset to default localhost:8080"
                onclick="S.proxyUrl='http://localhost:8080';safeLs.set('proxy_url','http://localhost:8080');render();showToast('Proxy URL reset to localhost:8080')">↺ Reset</button>
            </div>
          </div>
          <div class="btn-row">
            <button class="btn btn-sm" style="flex:1;justify-content:center;background:linear-gradient(135deg,#312E81,#4338CA);color:#C7D2FE;border:none"
              onclick="testProxy()" ${S.proxyTesting?"disabled":""}>
              ${S.proxyTesting?`<span class="spin">⟳</span> Testing…`:"⚡ Test Connection"}
            </button>
            <button class="btn btn-ghost btn-sm" onclick="lookupSecurityIds()" ${!S.proxyActive?"disabled":""}>
              🔍 Lookup Security IDs
            </button>
          </div>
          ${ETF_PORTFOLIO.map(p=>`
            <div style="display:flex;align-items:center;justify-content:space-between;padding:6px 10px;background:#090E18;border-radius:7px;font-size:12px;border:1px solid #18263A">
              <span><span style="font-size:14px">${p.icon}</span> <strong style="color:${p.color}">${p.ticker}</strong></span>
              <span class="mono" style="color:${p.securityId?"#6EE7B7":"#F87171"}">${p.securityId||"Not fetched"}</span>
            </div>`).join("")}
        </div>
      </div>
    </div>
    <div class="grid-2">
      <div class="card">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
          <div class="section-title" style="margin-bottom:0">🔬 Live Request Diagnostics</div>
          <button class="btn btn-ghost btn-sm" onclick="S.reqLog=[];repaintReqLog()">Clear</button>
        </div>
        <div id="req-log-content" style="max-height:340px;overflow-y:auto;font-size:11px">
          <div style="color:#40556A;padding:8px 0">No requests yet.</div>
        </div>
        <div class="btn-row" style="margin-top:14px;flex-wrap:wrap">
          <button class="btn btn-ghost btn-sm" onclick="(async()=>{const r=await dhanApi('GET','/v2/fundlimit');showToast(r.ok?'Fund limit ✓':'Failed: '+r.error,r.ok?'success':'error');})()">▶ /fundlimit</button>
          <button class="btn btn-ghost btn-sm" onclick="(async()=>{const r=await dhanApi('GET','/v2/holdings');if(r.ok){const arr=Array.isArray(r.data)?r.data:(r.data?.holdings||[]);showToast('Holdings: '+arr.length+' total',arr.length>0?'success':'error');}else showToast('Failed: '+r.error,'error');})()">▶ /holdings</button>
          <button class="btn btn-ghost btn-sm" onclick="(async()=>{const r=await dhanApi('GET','/v2/orders');showToast(r.ok?'Orders ✓ ('+r.data?.length+')':'Failed: '+r.error,r.ok?'success':'error');})()">▶ /orders</button>
        </div>
      </div>
      <div style="display:flex;flex-direction:column;gap:22px">
        <div class="card">
          <div class="section-title">30-Day Snapshot Log</div>
          <div style="padding:13px;background:#090E18;border-radius:10px;border:1px solid #18263A">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;flex-wrap:wrap;gap:6px">
              <div style="font-size:12px;color:#60778A;font-weight:600">📸 ${snaps.length} snapshots ${s30?`· Anchor: ${s30.date}`:""}</div>
              ${(()=>{
                if(snaps.length<2) return "";
                const recent=snaps.slice(0,31).slice().reverse();
                const changes=[];
                for(let i=1;i<recent.length;i++){
                  const s=recent[i], p=recent[i-1];
                  if(s.etfV===undefined||p.etfV===undefined) continue; // skip legacy
                  const delta=(s.etfV-s.etfC)-(p.etfV-p.etfC); // Δ unrealized
                  if(p.etfV>0) changes.push((delta/p.etfV)*100);
                }
                if(!changes.length) return "";
                const avg=changes.reduce((s,v)=>s+v,0)/changes.length;
                const pos=changes.filter(v=>v>0).length;
                const neg=changes.filter(v=>v<0).length;
                return `<div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
                  <div style="text-align:center">
                    <div style="font-size:9px;color:#40556A;text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px">Avg Daily P&L</div>
                    <div class="mono" style="font-size:14px;font-weight:700;color:${avg>=0?"#4ADE80":"#F87171"}">${avg>=0?"+":""}${avg.toFixed(2)}%</div>
                  </div>
                  <div style="text-align:center">
                    <div style="font-size:9px;color:#40556A;text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px">Win/Loss days</div>
                    <div style="font-size:12px"><span style="color:#4ADE80">${pos}▲</span> <span style="color:#F87171">${neg}▼</span></div>
                  </div>
                </div>`;
              })()}
            </div>
            ${!snaps.length?`<div style="font-size:12px;color:#40556A">No snapshots yet.</div>`:`
              <div style="max-height:240px;overflow-y:auto">
                <div style="display:grid;grid-template-columns:88px 1fr 68px 62px;gap:4px;padding:4px 6px;font-size:9px;color:#2A3F5C;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid #111D2E;margin-bottom:3px;position:sticky;top:0;background:#090E18">
                  <div>Date</div><div style="text-align:right">ETF Value</div><div style="text-align:right">ETF P&L</div><div style="text-align:right">%</div>
                </div>
                ${snaps.slice(0,30).map((s,i)=>{
                  const prev   = snaps[i+1];
                  const hasEtf = s.etfV!==undefined && s.etfC!==undefined;
                  const prevHasEtf = prev && prev.etfV!==undefined && prev.etfC!==undefined;
                  // True ETF P&L = change in unrealized gain (etfV - etfC) between snapshots
                  // Buys increase both etfV and etfC by the same amount → no artificial profit
                  const etfU_today = hasEtf ? (s.etfV - s.etfC) : null;
                  const etfU_prev  = prevHasEtf ? (prev.etfV - prev.etfC) : null;
                  const mktPnl = (etfU_today!==null && etfU_prev!==null) ? etfU_today - etfU_prev : null;
                  const pct    = mktPnl!==null && prev?.etfV>0 ? (mktPnl/prev.etfV)*100 : null;
                  const isA    = s30&&s30.date===s.date;
                  return `<div style="display:grid;grid-template-columns:88px 1fr 72px 64px;gap:4px;padding:5px 6px;border-radius:6px;${isA?"background:#0B1926;border:1px solid #1351A840":""}${i%2&&!isA?";background:#04080F":""}">
                    <div class="mono" style="font-size:11px;color:${isA?"#4FC3F7":"#60778A"}">${s.date}${isA?" ⚓":""}</div>
                    <div style="text-align:right">
                      <div class="mono" style="font-size:11px;color:${isA?"#4FC3F7":"#94A3B8"}">${hasEtf?fmtC(s.etfV):"—"}</div>
                      ${hasEtf?`<div style="font-size:9px;color:#40556A;margin-top:1px">cost ${fmtC(s.etfC)}</div>`:""}
                    </div>
                    <div class="mono" style="text-align:right;font-size:11px;color:${!hasEtf||!prevHasEtf?"#2A3F5C":mktPnl===null?"#2A3F5C":mktPnl>=0?"#4ADE80":"#F87171"}">
                      ${!hasEtf?`<span style="font-size:9px;color:#40556A">legacy</span>`:!prevHasEtf?"—":mktPnl===null?"—":(mktPnl>=0?"+":"-")+fmtC(Math.abs(mktPnl))}
                    </div>
                    <div class="mono" style="text-align:right;font-size:11px;font-weight:600;color:${!hasEtf||!prevHasEtf?"#2A3F5C":pct===null?"#2A3F5C":pct>=0?"#4ADE80":"#F87171"}">
                      ${!hasEtf||!prevHasEtf?"—":pct===null?"—":(pct>=0?"+":"")+pct.toFixed(2)+"%"}
                    </div>
                  </div>`;
                }).join("")}
              </div>`}
          </div>
          <div style="font-size:10px;color:#2A3F5C;margin-top:8px;line-height:1.5">
            ETF P&L = daily change in unrealized gain (LTP−avgCost)×qty · new buys cancel out automatically
          </div>
          <button class="btn btn-red btn-sm" style="margin-top:10px" onclick="if(confirm('Clear all data?')){safeLs.clear();location.reload();}">🗑️ Clear All Data</button>
        </div>
      </div>
    </div>
  </div>`;
}

/* ══════════════════════════════════════════════════
   MAIN RENDER
══════════════════════════════════════════════════ */
function switchTab(t){if(S.tab==="growth")destroyChart();S.tab=t;render();}
function toggleTicker(ticker){S.expandedTicker=(S.expandedTicker===ticker?null:ticker);render();}

function render(){
  const isSandbox=S.dhanEnv==="sandbox";
  el("hdr-badges").innerHTML=`
    ${S.lastRefreshed&&S.tab==="portfolio"?`<span style="font-size:11px;color:#40556A">↻ ${S.lastRefreshed.toLocaleTimeString()}</span>`:""}
    ${S.isDemo?`<span class="badge badge-amber">🎭 Demo</span>`:""}
    ${isSandbox?`<span class="badge badge-amber">🧪 SANDBOX</span>`:""}
    ${S.proxyActive
      ?`<span class="badge badge-purple"><span style="width:6px;height:6px;border-radius:50%;background:#A5B4FC;display:inline-block;animation:pulse 2s infinite;margin-right:4px"></span>Proxy</span>`
      :`<span class="badge badge-dim">No Proxy</span>`}
    ${S.connected
      ?`<span class="badge badge-green"><span class="live-dot"></span>${isSandbox?"Sandbox":"Dhan Live"}</span>`
      :`<span class="badge badge-red">Not Connected</span>`}
  `;
  document.querySelectorAll(".tab").forEach(t=>t.classList.toggle("active",t.dataset.tab===S.tab));
  let html="";
  if(S.tab==="portfolio")   html=renderPortfolio();
  else if(S.tab==="dashboard")  html=renderDashboard();
  else if(S.tab==="calculator") html=renderCalculator();
  else if(S.tab==="execute")    html=renderExecute();
  else if(S.tab==="growth")     html=renderGrowth();
  else if(S.tab==="settings")   html=renderSettings();
  el("content").innerHTML=html;
  // Widen layout for portfolio tab
  const isWide = S.tab==="portfolio";
  el("content").classList.toggle("wide", isWide);
  document.body.classList.toggle("wide-layout", isWide);
  if(S.tab==="settings") repaintReqLog();
  if(S.tab==="growth") requestAnimationFrame(buildGrowthChart);
  clearInterval(S.refreshTimer);
  if(S.tab==="portfolio"&&S.connected&&!S.isDemo)
    S.refreshTimer=setInterval(()=>fetchPortfolio(false),60000);
}

/* ══════════════════════════════════════════════════
   INIT
══════════════════════════════════════════════════ */
function initApp(){
  const appEl = document.getElementById("app");
  if(!appEl){ console.error("No #app element"); return; }

  appEl.innerHTML=`
  <div class="header">
    <div class="header-top">
      <div class="logo">
        <div class="logo-icon">📈</div>
        <div><div class="logo-name">Monthly Investment Strategy</div><div class="logo-sub">DHAN POWERED · ₹1.28 CR TARGET</div></div>
      </div>
      <div class="header-badges" id="hdr-badges"></div>
    </div>
    <div class="tabs">
      ${[["portfolio","📦 Portfolio"],["dashboard","📊 Dashboard"],["calculator","🧮 Calculator"],["execute","⚡ Execute"],["growth","📈 Growth"],["settings","⚙️ Settings"]]
        .map(([id,lbl])=>`<button class="tab" data-tab="${id}" onclick="switchTab('${id}')">${lbl}</button>`).join("")}
    </div>
  </div>
  <div class="content" id="content"></div>
  `;

  try{
    render();
  } catch(e){
    console.error("render() failed:", e);
    document.getElementById("content").innerHTML=
      `<div style="padding:40px;color:#F87171;font-family:monospace">
        <div style="font-size:18px;margin-bottom:12px">⚠️ Render error</div>
        <pre style="font-size:12px;color:#94A3B8;white-space:pre-wrap">${e.message}\n${e.stack}</pre>
      </div>`;
  }

  // Auto-fetch MF NAVs — mfapi.in is public, no proxy needed
  setTimeout(()=>{ try{ fetchAMFINavs(); } catch(e){ console.warn("fetchAMFINavs failed:", e); } }, 900);
}

if(document.readyState === "loading"){
  document.addEventListener("DOMContentLoaded", initApp);
} else {
  initApp();
}
</script>
</body>
</html>
