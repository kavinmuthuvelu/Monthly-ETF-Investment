<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Monthly Investment Strategy · Dhan</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:#07090F;color:#D8E3EF;min-height:100vh}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:#1E2D45;border-radius:4px}
#app{min-height:100vh}
.header{background:linear-gradient(180deg,#0B1728,#07090F);border-bottom:1px solid #18263A;padding:0 20px}
.header-top{max-width:960px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:62px;flex-wrap:wrap;gap:8px}
.logo{display:flex;align-items:center;gap:12px}
.logo-icon{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,#1351A8,#B87200);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.logo-name{font-size:17px;font-weight:700;letter-spacing:.3px}
.logo-sub{font-size:10px;color:#4FC3F7;margin-top:2px;letter-spacing:1.2px}
.header-badges{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.tabs{max-width:960px;margin:0 auto;display:flex;gap:2px;overflow-x:auto;padding-bottom:2px}
.tab{padding:8px 15px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:500;color:#60778A;border:none;background:transparent;white-space:nowrap;font-family:inherit;transition:all .2s}
.tab.active{background:#14243A;color:#4FC3F7}
.content{max-width:960px;margin:0 auto;padding:22px 20px}
.card{background:linear-gradient(145deg,#0E1520,#0A1018);border:1px solid #18263A;border-radius:16px;padding:22px}
.row-item{border:1px solid #18263A;border-radius:12px;padding:15px 18px;background:#090E18;transition:border-color .2s,transform .15s;margin-bottom:11px}
.row-item:hover{border-color:#253A58;transform:translateX(2px)}
.stat-card{background:#090E18;border:1px solid #18263A;border-radius:12px;padding:15px;text-align:center}
.stat-label{font-size:10px;color:#40556A;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.stat-val{font-family:'DM Mono',monospace;font-size:20px;font-weight:700}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:22px}
@media(max-width:900px){.grid-4{grid-template-columns:1fr 1fr!important}.grid-2{grid-template-columns:1fr!important}.portfolio-split{grid-template-columns:1fr!important}}
@media(max-width:540px){.grid-4{grid-template-columns:1fr!important}}
.btn{padding:9px 17px;border-radius:9px;border:none;cursor:pointer;font-family:inherit;font-weight:600;font-size:13px;transition:all .18s;display:inline-flex;align-items:center;gap:6px}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-blue{background:linear-gradient(135deg,#1351A8,#0278B8);color:#fff}
.btn-blue:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 8px 24px rgba(2,120,184,.35)}
.btn-amber{background:linear-gradient(135deg,#7A4A00,#B87200);color:#FDE68A}
.btn-amber:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 8px 24px rgba(184,114,0,.3)}
.btn-ghost{background:transparent;color:#7B8FA6;border:1px solid #18263A}
.btn-ghost:hover:not(:disabled){background:#18263A;color:#D8E3EF}
.btn-red{background:linear-gradient(135deg,#6B1414,#8B1C1C);color:#FCA5A5}
.btn-green{background:linear-gradient(135deg,#064E3B,#059669);color:#6EE7B7}
.btn-sm{padding:6px 13px;font-size:12px}
.btn-row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.inp{width:100%;background:#060A12;border:1px solid #18263A;border-radius:8px;padding:10px 13px;color:#D8E3EF;font-family:inherit;font-size:13px;outline:none;transition:border-color .2s}
.inp:focus{border-color:#4FC3F7}
.inp-label{font-size:12px;color:#60778A;display:block;margin-bottom:6px}
.range{width:100%;-webkit-appearance:none;height:4px;border-radius:2px;background:#1E2D45;outline:none;cursor:pointer}
.range::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:#4FC3F7;cursor:pointer;box-shadow:0 0 10px rgba(79,195,247,.5)}
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;letter-spacing:.4px;gap:4px}
.badge-green{background:#053D2F20;border:1px solid #059669;color:#6EE7B7}
.badge-red{background:#65000020;border:1px solid #7F1D1D;color:#FCA5A5}
.badge-amber{background:#78350f30;border:1px solid #78350f;color:#D97706}
.badge-blue{background:#0B1F3650;border:1px solid #1351A8;color:#4FC3F7}
.badge-purple{background:#1E1B4B50;border:1px solid #6366F1;color:#A5B4FC}
.badge-dim{background:#18263A;color:#60778A}
.pbar{height:5px;background:#18263A;border-radius:3px;overflow:hidden;margin-top:10px}
.pbar-fill{height:100%;border-radius:3px;transition:width .6s}
.htable{border-radius:16px;overflow:hidden;border:1px solid #18263A}
.htable-head{background:linear-gradient(145deg,#0E1520,#0A1018);padding:16px 20px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #18263A}
.htable-hdr{display:grid;grid-template-columns:2fr 1fr 1fr 1fr 1fr 1.2fr;gap:8px;padding:10px 20px;border-bottom:1px solid #18263A;font-size:11px;color:#40556A;text-transform:uppercase;letter-spacing:.8px}
.htable-row{display:grid;grid-template-columns:2fr 1fr 1fr 1fr 1fr 1.2fr;gap:8px;padding:15px 20px;border-bottom:1px solid rgba(24,38,58,.25);transition:background .2s;align-items:center}
.htable-row:hover{background:#0D1520}
.htable-foot{display:grid;grid-template-columns:2fr 1fr 1fr 1fr 1fr 1.2fr;gap:8px;padding:14px 20px;background:#0B1926;border-top:2px solid #18263A;align-items:center}
@media(max-width:900px){.htable-hdr,.htable-row,.htable-foot{grid-template-columns:2fr 1fr 1fr 1.2fr!important}.hcol3,.hcol4{display:none!important}}
@media(max-width:580px){.htable-hdr,.htable-row,.htable-foot{grid-template-columns:1fr 1fr!important}.hcol2,.hcol3,.hcol4,.hcol5{display:none!important}}
.toast{position:fixed;bottom:22px;right:22px;padding:12px 18px;border-radius:12px;font-size:13px;font-weight:500;z-index:9999;display:flex;align-items:center;gap:8px;animation:fadeIn .3s;max-width:380px}
.toast-ok{background:#053D2F;border:1px solid #059669;color:#6EE7B7}
.toast-err{background:#650E0E;border:1px solid #DC2626;color:#FCA5A5}
.toast-hide{display:none}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideDown{from{opacity:0;transform:translateY(-20px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
@keyframes spin{to{transform:rotate(360deg)}}
.anim-fade{animation:fadeIn .35s ease forwards}
.spin{animation:spin .85s linear infinite;display:inline-block}
.live-dot{animation:pulse 2s infinite;width:6px;height:6px;border-radius:50%;background:#6EE7B7;display:inline-block}
.mono{font-family:'DM Mono',monospace}
.serif{font-family:Georgia,serif}
.c-blue{color:#4FC3F7}.c-amber{color:#B87200}.c-green{color:#4ADE80}.c-red{color:#F87171}.c-dim{color:#60778A}.c-muted{color:#40556A}
.hidden{display:none!important}
.section-title{font-family:Georgia,serif;font-size:20px;margin-bottom:16px;color:#D8E3EF}
.info-box{padding:14px;background:#090E18;border-radius:10px;border:1px solid #18263A;font-size:12px;color:#60778A;line-height:1.85}
.sip-banner{margin-top:18px;padding:18px 22px;background:linear-gradient(135deg,#0C1828,#091220);border:1px solid #1351A860;border-radius:14px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:14px}
.mode-card{flex:1;min-width:200px;padding:14px 18px;border-radius:12px;cursor:pointer;border:2px solid #18263A;background:#090E18;transition:all .2s}
.mode-card.active-app{border-color:#4FC3F7;background:#0B1F36}
.mode-card.active-api{border-color:#B87200;background:#180E00}
.year-row{background:#090E18;border:1px solid #18263A;border-radius:10px;padding:12px 16px;display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;transition:opacity .3s}
.snap-row{display:flex;justify-content:space-between;padding:6px 10px;border-radius:7px;font-size:12px}
.snap-row.anchor{background:#0B1926;border:1px solid #1351A860}
.history-row{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:#090E18;border-radius:11px;border:1px solid #18263A;margin-bottom:8px;flex-wrap:wrap;gap:8px}
.preset-btn{padding:10px 12px;background:#090E18;border:1px solid #18263A;border-radius:10px;cursor:pointer;text-align:center;transition:all .2s}
.preset-btn:hover{border-color:#4FC3F7}
.gap-form{display:flex;flex-direction:column;gap:14px}
.rule-box{padding:16px;background:#090E18;border-radius:12px;margin-bottom:12px}
.isin-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;flex-wrap:wrap;gap:4px}
.charges-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
@media(max-width:600px){.charges-grid{grid-template-columns:repeat(2,1fr)!important}}
pre{font-family:'DM Mono',monospace;font-size:11px;color:#FCD34D;white-space:pre-wrap;line-height:1.75;word-break:break-word}
code{font-family:'DM Mono',monospace;color:#C9940E;font-size:11px}

/* ── Env toggle ── */
.env-toggle{display:flex;background:#060A12;border:1px solid #18263A;border-radius:10px;padding:4px;gap:4px}
.env-opt{flex:1;padding:8px 12px;border-radius:7px;border:none;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;text-align:center;background:transparent;color:#60778A}
.env-opt.active-prod{background:linear-gradient(135deg,#064E3B,#059669);color:#6EE7B7}
.env-opt.active-sand{background:linear-gradient(135deg,#78350f,#B87200);color:#FCD34D}

/* ── Request log ── */
.req-row{display:grid;grid-template-columns:54px 40px 1fr 60px;gap:6px;padding:5px 0;border-bottom:1px solid rgba(24,38,58,.4);font-family:'DM Mono',monospace;font-size:11px;align-items:baseline}
.req-row:last-child{border-bottom:none}
.req-detail{grid-column:1/-1;padding:2px 0 4px 94px;font-size:10px;color:#F87171;word-break:break-all}

/* ── Order modal ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:800;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(6px)}
.modal-box{background:linear-gradient(145deg,#0E1520,#0A1018);border:1px solid #18263A;border-radius:20px;width:100%;max-width:520px;box-shadow:0 40px 100px rgba(0,0,0,.9);animation:slideDown .2s ease}
.modal-hd{display:flex;align-items:center;justify-content:space-between;padding:20px 22px;border-bottom:1px solid #18263A}
.modal-bd{padding:22px}
.modal-ft{padding:16px 22px;border-top:1px solid #18263A;display:flex;gap:10px;justify-content:flex-end;align-items:center}
.om-status{padding:14px 16px;border-radius:10px;border:1px solid;font-size:13px;line-height:1.6;animation:fadeIn .2s}
.om-idle   {background:#090E18;border-color:#18263A;color:#60778A}
.om-placing{background:#0C1828;border-color:#1351A8;color:#4FC3F7}
.om-polling{background:#130A00;border-color:#78350f;color:#FCD34D}
.om-done   {background:#053D2F;border-color:#059669;color:#6EE7B7}
.om-reject {background:#650E0E;border-color:#DC2626;color:#FCA5A5}
.om-error  {background:#650E0E;border-color:#DC2626;color:#FCA5A5}
.om-timeout{background:#130A00;border-color:#78350f;color:#FCD34D}

/* ── Today orders table ── */
.ord-table{width:100%;border-collapse:collapse;font-size:12px}
.ord-table th{padding:7px 10px;text-align:left;font-size:10px;color:#40556A;text-transform:uppercase;letter-spacing:.8px;border-bottom:1px solid #18263A;background:#090E18}
.ord-table td{padding:9px 10px;border-bottom:1px solid rgba(24,38,58,.3)}
.ord-table tr:last-child td{border-bottom:none}
.ord-table tr:hover td{background:#0D1520}
.os{padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700;letter-spacing:.4px}
.os-ok {background:#053D2F;color:#6EE7B7}
.os-bad{background:#650E0E;color:#FCA5A5}
.os-pend{background:#0C1828;color:#4FC3F7}
</style>
</head>
<body>
<div id="app"></div>
<div id="toast" class="toast toast-hide"></div>

<!-- ORDER MODAL -->
<div id="order-modal" style="display:none" class="modal-overlay" onclick="if(event.target===this&&!isModalLocked())closeOrderModal()">
  <div class="modal-box">
    <div class="modal-hd">
      <div>
        <div style="font-size:17px;font-weight:700" id="om-title">Place Order</div>
        <div style="font-size:12px;color:#60778A;margin-top:2px" id="om-env-badge"></div>
      </div>
      <button class="btn btn-ghost btn-sm" id="om-x" onclick="closeOrderModal()">✕</button>
    </div>
    <div class="modal-bd">
      <div style="display:flex;align-items:center;gap:14px;padding:14px 16px;background:#090E18;border-radius:12px;border:1px solid #18263A;margin-bottom:16px">
        <span style="font-size:28px" id="om-icon"></span>
        <div style="flex:1">
          <div style="font-size:14px;font-weight:600" id="om-name"></div>
          <div style="font-size:12px;color:#60778A;margin-top:3px"><span class="mono" id="om-ticker"></span> · NSE · CNC · MARKET · BUY</div>
        </div>
        <div style="text-align:right">
          <div class="mono" style="font-size:20px;font-weight:700;color:#4FC3F7" id="om-amt"></div>
          <div style="font-size:10px;color:#40556A">allocated</div>
        </div>
      </div>
      <div id="om-status"></div>
    </div>
    <div class="modal-ft" id="om-footer"></div>
  </div>
</div>

<!-- DHAN APP MODAL -->
<div id="dhan-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:900;align-items:center;justify-content:center;padding:20px">
  <div style="background:linear-gradient(145deg,#0E1520,#0A1018);border:1px solid #18263A;border-radius:20px;width:100%;max-width:560px;max-height:90vh;overflow-y:auto;box-shadow:0 24px 60px rgba(0,0,0,.8)">
    <div style="display:flex;align-items:center;justify-content:space-between;padding:20px 22px;border-bottom:1px solid #18263A">
      <div><div style="font-size:17px;font-weight:700">📱 Open All in Dhan</div><div style="font-size:12px;color:#60778A;margin-top:3px">Tap each button to open in Dhan app or web</div></div>
      <button class="btn btn-ghost btn-sm" onclick="closeDhanModal()">✕</button>
    </div>
    <div style="padding:16px 22px;display:flex;flex-direction:column;gap:8px" id="dhan-modal-body"></div>
    <div style="padding:16px 22px;border-top:1px solid #18263A;display:flex;align-items:center;justify-content:space-between">
      <div style="font-size:12px;color:#60778A">Total SIP: <strong class="mono" style="color:#4FC3F7" id="modal-sip-total"></strong></div>
      <button class="btn btn-ghost btn-sm" onclick="closeDhanModal()">Done</button>
    </div>
  </div>
</div>

<script>
/* ══════════════════════════════════════════════════
   DATA
══════════════════════════════════════════════════ */
// ── Instrument types ──────────────────────────────────────────────────
// type:"MF"  → Mutual Fund (invest via Dhan MF platform / BSE StarMF)
// type:"ETF" → Exchange-traded (buy via /v2/orders, shows in /v2/holdings)
// ─────────────────────────────────────────────────────────────────────
const PORTFOLIO = [
  // Ordered by allocation weight — 4 ETFs + 2 MFs = 100%
  {id:"niftybees",
   category:"Nifty 50",
   weight:30,
   instrument:"Nippon India ETF Nifty 50 BeES",
   ticker:"NIFTYBEES",
   isin:"INF204KB13I2",
   type:"ETF",
   color:"#4FC3F7",
   icon:"🏛️",
   securityId:null},

  {id:"utimq100",
   category:"Momentum Quality",
   weight:40,
   instrument:"UTI Nifty Midsmallcap 400 MQ 100 Index Fund Direct – Growth",
   ticker:"UTIMQ100",
   isin:"INF789F1AB22",
   type:"MF",
   color:"#81C784",
   icon:"🚀",
   dhanMFUrl:"https://dhan.co/mutual-funds/uti-nifty-midsmallcap-400-momentum-quality-100-index-fund-direct-growth/",
   amc:"UTI Mutual Fund"},

  {id:"ppfcf",
   category:"Flexi Cap",
   weight:9,
   instrument:"Parag Parikh Flexi Cap Fund Direct – Growth",
   ticker:"PPFCF",
   isin:"INF879O01027",
   type:"MF",
   color:"#FFB74D",
   icon:"⚙️",
   dhanMFUrl:"https://dhan.co/mutual-funds/parag-parikh-flexi-cap-fund-direct-growth/",
   amc:"PPFAS Mutual Fund"},

  {id:"mon100",
   category:"Global Tech",
   weight:11,
   instrument:"Motilal Oswal Nasdaq 100 ETF",
   ticker:"MON100",
   isin:"INF247L01792",
   type:"ETF",
   color:"#BA68C8",
   icon:"🌐",
   securityId:null},

  {id:"goldbees",
   category:"Gold",
   weight:5,
   instrument:"Nippon India ETF Gold BeES",
   ticker:"GOLDBEES",
   isin:"INF204KB17I4",
   type:"ETF",
   color:"#FFD54F",
   icon:"🥇",
   securityId:null},

  {id:"silverbees",
   category:"Silver",
   weight:5,
   instrument:"Nippon India Silver ETF",
   ticker:"SILVERBEES",
   isin:"INF204KC1402",
   type:"ETF",
   color:"#C0C0C0",
   icon:"🥈",
   securityId:null},
];
// Weights: 30+40+9+11+5+5 = 100%

const ETF_PORTFOLIO = PORTFOLIO.filter(p=>p.type==="ETF");   // NIFTYBEES, MON100, GOLDBEES, SILVERBEES
const MF_PORTFOLIO  = PORTFOLIO.filter(p=>p.type==="MF");    // UTIMQ100, PPFCF
const STRATEGY_ETF  = ETF_PORTFOLIO;                          // all 4 ETFs are active strategy

// Dual lookup: tradingSymbol primary (reliable), ISIN fallback
const ISIN_MAP   = Object.fromEntries(ETF_PORTFOLIO.map(p=>[p.isin.toUpperCase(), p]));
const SYMBOL_MAP = Object.fromEntries(ETF_PORTFOLIO.map(p=>[p.ticker.toUpperCase(), p]));
const BASE_SIP = 22000;
const SNAP_KEY = "portfolio_snapshots";

/* ══════════════════════════════════════════════════
   STATE
══════════════════════════════════════════════════ */
const S = {
  apiKey:    localStorage.getItem("dhan_api_key")   || "",
  clientId:  localStorage.getItem("dhan_client_id") || "",
  startDate: localStorage.getItem("start_date")     || "",
  trackingStartDate: localStorage.getItem("tracking_start_date") || "",  // for investment accounting
  proxyUrl:  localStorage.getItem("proxy_url")      || (location.protocol==="file:"?"http://localhost:8080":location.origin),
  dhanEnv:   localStorage.getItem("dhan_env")       || "production",  // "production" | "sandbox"
  proxyActive:   false,
  proxyTesting:  false,
  renewingToken: false,
  connected:     false,
  tab:       "portfolio",
  orderMode: "app",
  lossPercent:   0,
  etfHoldings:   [],
  unmatchedHoldings: [],
  expandedTicker: null,   // which ETF row is expanded to show trade detail
  showOtherHoldings: false,   // collapsed by default — not accounted in totals
  portfolioLoading: false,
  portfolioError:   null,
  lastRefreshed:    null,
  isDemo:    false,
  snapshots: loadSnapshots(),
  snap30:    null,
  thirtyDayPnLPct: 0,
  history:   [],
  orders:    [],          // trades placed by this session
  todayOrders: [],        // synced from /v2/orders
  todayOrdersLoading: false,
  todayOrdersError:   null,
  reqLog:    [],          // live diagnostics
  // ── MF holdings (manually entered + AMFI NAV enriched) ──────────
  mfHoldings: loadMFHoldings(),   // { [isin]: [ {date, units, nav, amount}, ... ] }
  mfNavs:     {},                 // { [isin]: { nav, date, schemeName } }  from AMFI
  mfNavLoading: false,
  mfNavError: null,
  // ── Growth chart ────────────────────────────────────────────────
  nifty50History: null,        // {dates:[], closes:[]} from Dhan historical API
  nifty50Loading: false,
  nifty50Error:   null,
  chartInstance:  null,        // Chart.js instance ref
  // ────────────────────────────────────────────────────────────────
  toastTimer:null,
  refreshTimer:null,
  om: {                   // order modal state
    open:false, p:null, phase:"idle",
    orderId:null, message:"", charges:null,
    tradedPrice:null, tradedQty:null, amount:0,
    pollCount:0, pollTimer:null,
  }
};
try { S.history = JSON.parse(localStorage.getItem("sip_history")||"[]"); } catch{}
S.snap30 = get30DayValue(S.snapshots);

/* ── helpers ── */
const fmt  = n => Number(n).toLocaleString("en-IN",{maximumFractionDigits:2});
const fmtC = n => `₹${fmt(n)}`;
const fmtP = n => `${n>=0?"+":""}${Number(n).toFixed(2)}%`;
const el   = id => document.getElementById(id);

function dhanHost(){ return S.dhanEnv==="sandbox" ? "sandbox.dhan.co" : "api.dhan.co"; }

function yearFloor(){ return getYearFloor(S.startDate, BASE_SIP); }
function sipTotal(){  return computeSIP(S.lossPercent, yearFloor()); }

/* ══════════════════════════════════════════════════
   GROWTH CHART HELPERS
   - "Invested" line  = cumulative SIPs from S.history since trackingStartDate
   - "Portfolio" line = portfolio snapshots since trackingStartDate
   - "NIFTYBEES SIP"  = simulated: each SIP buys NIFTYBEES units instead;
                        shows what the same money in NIFTYBEES would be worth
══════════════════════════════════════════════════ */

// SIP history entries on/after trackingStartDate, oldest first
function filteredSIPHistory(){
  const sd = S.trackingStartDate;
  return S.history
    .filter(e => !sd || normaliseDate(e.date) >= sd)
    .map(e => ({...e, isoDate: normaliseDate(e.date)}))
    .sort((a,b) => a.isoDate.localeCompare(b.isoDate));
}

// Normalise whatever date format S.history uses → "YYYY-MM-DD"
function normaliseDate(d){
  if(!d) return "";
  if(/^\d{4}-\d{2}-\d{2}$/.test(d)) return d;
  if(/^\d{2}\/\d{2}\/\d{4}$/.test(d)){
    const [dd,mm,yyyy]=d.split("/"); return `${yyyy}-${mm.padStart(2,"0")}-${dd.padStart(2,"0")}`;
  }
  try{ return new Date(d).toISOString().slice(0,10); } catch{ return d; }
}

// Build monthly axis dates from startD → today
function buildAxisDates(startD){
  const axisDates=[];
  let cur=new Date(startD); const end=new Date();
  while(cur<=end){ axisDates.push(cur.toISOString().slice(0,10)); cur.setMonth(cur.getMonth()+1); }
  const today=new Date().toISOString().slice(0,10);
  if(axisDates[axisDates.length-1]!==today) axisDates.push(today);
  return axisDates;
}

// Cumulative invested from SIP history, aligned to axisDates
function buildCumulativeInvested(axisDates){
  const entries = filteredSIPHistory();
  if(!entries.length) return axisDates.map(()=>0);
  let cum=0, li=0;
  return axisDates.map(d=>{
    while(li<entries.length && entries[li].isoDate<=d){ cum+=entries[li].amount; li++; }
    return cum;
  });
}

// Simulate: same SIPs buying NIFTYBEES units, returns cumulative portfolio value per axis date
function buildNiftybeesSIP(axisDates){
  if(!S.nifty50History) return null;
  const entries = filteredSIPHistory();
  if(!entries.length) return null;

  const {dates:nd, closes:nc} = S.nifty50History;
  // Build a map: date → close (use last known price for any date)
  const niftyMap = {};
  nd.forEach((d,i)=>{ niftyMap[d]=nc[i]; });

  // Find the NIFTYBEES close on or before a given date
  function priceAt(d){
    let p=null;
    for(const nd2 of nd){ if(nd2<=d) p=niftyMap[nd2]; else break; }
    return p;
  }

  // Accumulate units bought on each SIP date
  let totalUnits=0;
  let entryIdx=0;
  return axisDates.map(d=>{
    while(entryIdx<entries.length && entries[entryIdx].isoDate<=d){
      const price = priceAt(entries[entryIdx].isoDate);
      if(price>0) totalUnits += entries[entryIdx].amount / price;
      entryIdx++;
    }
    const curPrice = priceAt(d);
    if(!curPrice||totalUnits===0) return null;
    return parseFloat((totalUnits*curPrice).toFixed(2));
  });
}

// Approximate XIRR using Newton-Raphson, from SIP history vs current portfolio value
function computeXIRR(curVal){
  try{
    const entries = filteredSIPHistory();
    if(!entries.length||!curVal) return "—";
    const today=new Date();
    const cf=[...entries.map(e=>({date:new Date(e.isoDate),amount:-e.amount})),
               {date:today,amount:curVal}];
    const npv=(r)=>cf.reduce((s,{date,amount})=>{
      const t=(date-cf[0].date)/(365.25*24*3600*1000);
      return s+amount/Math.pow(1+r,t);
    },0);
    let r=0.1;
    for(let i=0;i<60;i++){
      const f=npv(r), df=(npv(r+1e-6)-f)/1e-6;
      if(Math.abs(df)<1e-12) break;
      const nr=r-f/df;
      if(Math.abs(nr-r)<1e-7){r=nr;break;}
      r=nr; if(r<-0.99)r=-0.5; if(r>10)r=2;
    }
    if(isNaN(r)||!isFinite(r)) return "—";
    return `${r>=0?"+":""}${(r*100).toFixed(1)}%`;
  }catch{return "—";}
}

function buildGrowthChart(){
  destroyChart();
  const canvas=document.getElementById("growth-chart");
  if(!canvas) return;

  const sipEntries = filteredSIPHistory();
  const startD = S.trackingStartDate || sipEntries[0]?.isoDate
               || new Date(Date.now()-86400000*730).toISOString().slice(0,10);
  const axisDates = buildAxisDates(startD);
  const today = axisDates[axisDates.length-1];

  // Dataset 1: cumulative invested (step)
  const investedData = buildCumulativeInvested(axisDates);

  // Dataset 2: portfolio value from snapshots + current live value
  const snapMap={};
  S.snapshots.forEach(s=>{
    if(!S.trackingStartDate||s.date>=S.trackingStartDate) snapMap[s.date]=s.value;
  });
  if(S.etfHoldings.length||MF_PORTFOLIO.some(p=>S.mfHoldings[p.isin])){
    snapMap[today]=totalCurrent()+(MF_PORTFOLIO.reduce((s,p)=>s+(mfCurrentValue(p.isin)||0),0));
  }
  const sortedSnaps=Object.keys(snapMap).sort();
  const portfolioData=axisDates.map(d=>{
    let best=null;
    for(const sd of sortedSnaps){ if(sd<=d) best=snapMap[sd]; else break; }
    return best;
  });

  // Dataset 3: NIFTYBEES SIP simulation
  const niftyData = buildNiftybeesSIP(axisDates);

  const labels=axisDates.map(d=>{
    const dt=new Date(d); return dt.toLocaleDateString("en-IN",{month:"short",year:"2-digit"});
  });

  const datasets=[{
    label:"Invested ₹",
    data:investedData,
    borderColor:"#4FC3F7",
    backgroundColor:"rgba(79,195,247,0.07)",
    borderWidth:2,
    borderDash:[6,3],
    stepped:true,
    fill:true,
    pointRadius:0,
    tension:0,
  }];

  if(portfolioData.some(v=>v!==null)){
    datasets.push({
      label:"Portfolio Value ₹",
      data:portfolioData,
      borderColor:"#4ADE80",
      backgroundColor:"rgba(74,222,128,0.06)",
      borderWidth:2.5,
      fill:true,

      tension:0.3,

  if(niftyData&&niftyData.some(v=>v!==null)){
    datasets.push({
      label:"NIFTYBEES SIP simulation ₹",
      data:niftyData,
      borderColor:"#FB923C",
      backgroundColor:"transparent",
      borderWidth:2,
      borderDash:[4,2],
      pointRadius:0,
      tension:0.3,
      spanGaps:true,
    });
  }

  if(!datasets.some(d=>d.data.some(v=>v))){
    canvas.getContext("2d").clearRect(0,0,canvas.width,canvas.height);
    return;
  }

  const ctx=canvas.getContext("2d");
  S.chartInstance=new Chart(ctx,{
    type:"line",
    data:{labels, datasets},
    options:{
      responsive:true,
      maintainAspectRatio:false,
      interaction:{mode:"index",intersect:false},
      plugins:{
        legend:{labels:{color:"#94A3B8",font:{family:"DM Sans",size:12},padding:20,usePointStyle:true,pointStyleWidth:14}},
        tooltip:{
          backgroundColor:"#0E1520",borderColor:"#18263A",borderWidth:1,
          titleColor:"#D8E3EF",bodyColor:"#94A3B8",padding:12,
          callbacks:{label:(ctx)=>{
            const v=ctx.raw;
            if(v===null||v===undefined) return null;
            return ` ${ctx.dataset.label.split(" \u20B9")[0]}: \u20B9${Number(v).toLocaleString("en-IN",{maximumFractionDigits:0})}`;
          }}
        }
      },
      scales:{
        x:{grid:{color:"rgba(24,38,58,0.5)"},ticks:{color:"#40556A",font:{size:11},maxTicksLimit:14}},
        y:{grid:{color:"rgba(24,38,58,0.5)"},ticks:{color:"#40556A",font:{size:11},
          callback:(v)=>"\u20B9"+Number(v).toLocaleString("en-IN",{notation:"compact",maximumFractionDigits:1})}}

}

function saveSnapshot(v){ const t=new Date().toISOString().slice(0,10); let s=loadSnapshots().filter(x=>x.date!==t); s.unshift({date:t,value:v}); s=s.slice(0,90); localStorage.setItem(SNAP_KEY,JSON.stringify(s)); return s; }
function get30DayValue(snaps){ if(!snaps.length)return null; const t=new Date(); t.setDate(t.getDate()-30); const ts=t.toISOString().slice(0,10); let best=null,bd=Infinity; snaps.forEach(s=>{const d=Math.abs(new Date(s.date)-new Date(ts))/864e5; if(d<=5&&d<bd){bd=d;best=s;}}); return best; }

   MF HOLDINGS — manual entry + AMFI NAV enrichment
══════════════════════════════════════════════════ */
// MF helpers — mfHoldings[isin] is now an array of {date,units,nav,amount}
function mfEntries(isin){ return S.mfHoldings[isin]||[]; }
function mfTotalUnits(isin){ return mfEntries(isin).reduce((s,e)=>s+e.units,0); }
function mfTotalInvested(isin){ return mfEntries(isin).reduce((s,e)=>s+e.amount,0); }
function mfAvgNav(isin){ const u=mfTotalUnits(isin); return u>0?mfTotalInvested(isin)/u:0; }
function mfCurrentValue(isin){
  const entries=mfEntries(isin); if(!entries.length) return null;
  const nav=S.mfNavs[isin]?.nav; if(!nav) return null;
  return mfTotalUnits(isin)*nav;
}
function mfPnL(isin){
  const cur=mfCurrentValue(isin); if(cur===null) return null;
  const inv=mfTotalInvested(isin); return cur-inv;
}
function mfPnLPct(isin){
  const pnl=mfPnL(isin); if(pnl===null) return null;
  const inv=mfTotalInvested(isin); return inv>0?(pnl/inv)*100:null;
}

function addMFEntry(isin, date, units, nav, amount){
  if(!S.mfHoldings[isin]) S.mfHoldings[isin]=[];
  S.mfHoldings[isin].push({
    date: date||new Date().toISOString().slice(0,10),
    units: parseFloat(units)||0,
    nav:   parseFloat(nav)||0,
    amount:parseFloat(amount)||(parseFloat(units)*parseFloat(nav))||0,
  });
  // keep sorted oldest first
  S.mfHoldings[isin].sort((a,b)=>a.date.localeCompare(b.date));
  saveMFHoldings(S.mfHoldings);
  render(); showToast("MF entry added ✓");
  if(S.proxyActive) fetchAMFINavs();
}

function deleteMFEntry(isin, idx){
  if(!S.mfHoldings[isin]) return;
  S.mfHoldings[isin].splice(idx,1);
  if(!S.mfHoldings[isin].length) delete S.mfHoldings[isin];
  saveMFHoldings(S.mfHoldings);
  render(); showToast("Entry removed","error");
}

function deleteMFHolding(isin){
  delete S.mfHoldings[isin]; saveMFHoldings(S.mfHoldings); render();
  showToast("All entries removed","error");
}

async function fetchAMFINavs(){
  const isins=MF_PORTFOLIO.map(p=>p.isin);
  if(!isins.length) return;
  S.mfNavLoading=true; S.mfNavError=null;
  if(S.tab==="portfolio") render();

  const base=S.proxyUrl.replace(/\/+$/,"");
  try{
    const r=await fetch(`${base}/amfi-nav?isins=${encodeURIComponent(isins.join(","))}`);
    if(!r.ok) throw new Error("HTTP "+r.status);
    const data=await r.json();
    if(data.error) throw new Error(data.error);
    S.mfNavs={...S.mfNavs,...data};
    showToast(`NAV updated: ${Object.keys(data).map(isin=>{
      const p=MF_PORTFOLIO.find(x=>x.isin===isin);
      return (p?.ticker||isin.slice(-4))+" ₹"+(data[isin].nav||"?");
    }).join(", ")} ✓`);
  } catch(e){
    S.mfNavError=e.message;
    showToast("AMFI NAV fetch failed: "+e.message,"error");
  }
  S.mfNavLoading=false;
  if(S.tab==="portfolio") render();
}

/* ══════════════════════════════════════════════════
   SCRIP LOOKUP — auto-fills ETF security IDs from
   Dhan scrip master CSV via proxy /scrip-lookup
══════════════════════════════════════════════════ */
async function lookupSecurityIds(){
  if(!S.proxyActive){ showToast("Enable proxy first","error"); return; }
  const etfs = ETF_PORTFOLIO.filter(p=>!p.securityId);
  if(!etfs.length){ showToast("All ETF security IDs already known ✓"); return; }

  showToast(`Looking up ${etfs.length} security ID(s)…`);
  const symbols = etfs.map(p=>p.ticker).join(",");
  const isins   = etfs.map(p=>p.isin).join(",");

  try {
    const base = S.proxyUrl.replace(/\/+$/,"");

    // Try by ticker first (compact CSV, faster)
    const r1 = await fetch(`${base}/scrip-lookup?symbols=${encodeURIComponent(symbols)}`);
    const d1 = await r1.json().catch(()=>({}));
    let found = 0;

    ETF_PORTFOLIO.forEach(p=>{
      const hit = d1[p.ticker.toUpperCase()];
      if(hit?.securityId){ p.securityId=hit.securityId; found++; }
    });

    // For any still missing, try by ISIN (detailed CSV)
    const stillMissing = ETF_PORTFOLIO.filter(p=>!p.securityId);
    if(stillMissing.length){
      const isinStr = stillMissing.map(p=>p.isin).join(",");
      const r2 = await fetch(`${base}/scrip-lookup?isins=${encodeURIComponent(isinStr)}`);
      const d2 = await r2.json().catch(()=>({}));
      stillMissing.forEach(p=>{
        const hit = d2[p.isin.toUpperCase()];
        if(hit?.securityId){ p.securityId=hit.securityId; found++; }
      });
    }

    const still = ETF_PORTFOLIO.filter(p=>!p.securityId).map(p=>p.ticker);
    if(found){
      showToast(`✓ Found ${found} security ID(s): ${ETF_PORTFOLIO.filter(p=>p.securityId).map(p=>p.ticker+"="+p.securityId).join(", ")}`);
    }
    if(still.length){
      showToast(`⚠️ Not found in scrip master: ${still.join(", ")} — check ticker spelling`, "error");
    }
  } catch(e){
    showToast("Scrip lookup failed: "+e.message,"error");
  }
  render();
}

function makeDemoHoldings(){

      availableQty:qty,securityId:p.securityId||`DEMO_${p.id}`,tradingSymbol:p.ticker};
  });
}

  const t=new Date();
  S.reqLog.unshift({
    id:t.getTime(), ts:`${String(t.getHours()).padStart(2,'0')}:${String(t.getMinutes()).padStart(2,'0')}:${String(t.getSeconds()).padStart(2,'0')}`,
    method,path,status,ms,detail
  });
  if(S.reqLog.length>50)S.reqLog.pop();
  repaintReqLog();
}
function repaintReqLog(){
  const c=el("req-log-content");
  if(!c)return;
  if(!S.reqLog.length){c.innerHTML=`<div style="color:#40556A;font-size:12px;padding:8px 0">No requests yet — connect or test proxy to see activity.</div>`;return;}
  c.innerHTML=S.reqLog.map(r=>{
    const isOk=r.status&&(r.status.startsWith("2")||r.status.startsWith("4"));
    const isErr=r.status&&(r.status.startsWith("5")||r.status==="ERROR"||r.status==="CORS");
    const sc=isErr?"#F87171":isOk?"#4ADE80":"#60778A";
    const mc=r.method==="GET"?"#4ADE80":"#4FC3F7";
    const msLabel=r.ms?`<span style="color:#40556A">${r.ms}ms</span>`:"";
    return `<div class="req-row">
      <span style="color:#40556A">${r.ts}</span>
      <span style="color:${mc};font-weight:700">${r.method}</span>
      <span style="color:#94A3B8;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${r.path}">${r.path}</span>
      <span style="color:${sc};text-align:right">${r.status||"…"} ${msLabel}</span>
    </div>${r.detail?`<div class="req-detail">↳ ${r.detail.slice(0,200)}</div>`:""}`;
  }).join("");
}

/* ══════════════════════════════════════════════════
   CORE API WRAPPER  — ALL DHAN CALLS GO THROUGH HERE
   Reads body as text first to avoid JSON.parse crash
   on HTML error pages (the "Invalid CORS request" bug)
══════════════════════════════════════════════════ */
async function dhanApi(method, path, body){
  // Always route through proxy — direct calls will CORS-fail
  if(!S.proxyActive){
    const errMsg = "Proxy not active — enable proxy in Settings first";
    addReqLog(method, path, "NO_PROXY", 0, errMsg);
    return {ok:false, status:0, data:null, error:errMsg};
  }

  const base = S.proxyUrl.replace(/\/+$/,"");
  const url  = base + path;
  const t0   = Date.now();
  const reqId = t0;

  // Add pending entry
  S.reqLog.unshift({id:reqId, ts:new Date().toLocaleTimeString('en-GB',{hour12:false}), method, path, status:"…", ms:0, detail:null});
  if(S.reqLog.length>50)S.reqLog.pop();
  repaintReqLog();

  const headers = {
    "Content-Type": "application/json",
    "Accept":       "application/json",
    "access-token": S.apiKey || "",
    "dhanClientId": S.clientId || "",
    "X-Dhan-Host":  dhanHost(),  // proxy uses this to route to sandbox vs production
  };

  try {
    const res  = await fetch(url, {
      method,
      headers,
      body: body ? JSON.stringify(body) : undefined
    });

    // Always read as text to avoid crash on non-JSON responses
    const text = await res.text();
    const ms   = Date.now()-t0;
    let json=null, parseErr=null;
    try { json=JSON.parse(text); } catch(e){ parseErr=e.message; }

    const entry=S.reqLog.find(r=>r.id===reqId);
    if(entry){
      entry.status=String(res.status);
      entry.ms=ms;
      if(!res.ok||parseErr){
        entry.detail = json?.errorMessage || json?.message ||
          (parseErr?`Non-JSON: "${text.slice(0,100)}"`:null);
      }
    }
    repaintReqLog();

    if(!res.ok){
      const errMsg=json?.errorMessage||json?.message||json?.errorCode||(parseErr?`Non-JSON response: ${text.slice(0,80)}`:`HTTP ${res.status}`);
      return{ok:false,status:res.status,data:json,error:errMsg};
    }
    if(parseErr){
      return{ok:false,status:res.status,data:null,error:`Response was not JSON. Got: "${text.slice(0,80)}"`};
    }
    return{ok:true,status:res.status,data:json};

  } catch(err){
    const ms=Date.now()-t0;
    const isCors=err.message.includes("Failed to fetch")||err.message.includes("NetworkError");
    const entry=S.reqLog.find(r=>r.id===reqId);
    if(entry){entry.status=isCors?"CORS":"ERROR";entry.ms=ms;entry.detail=err.message;}
    repaintReqLog();
    return{ok:false,status:0,data:null,
      error:isCors?"Proxy not reachable — is dhan-proxy.js running? Run: node dhan-proxy.js":err.message};
  }
}

async function testProxy(){
  S.proxyTesting=true; render();
  const base=S.proxyUrl.replace(/\/+$/,"");
  try {
    const r=await fetch(base+"/health",{signal:AbortSignal.timeout(4000)});
    if(r.ok){
      const j=await r.json().catch(()=>({}));
      S.proxyActive=true;
      showToast(`Proxy ✓ ${j.proxy||"running"} at ${base}`);
      // Opportunistically fetch MF NAVs if we have MF funds
      if(MF_PORTFOLIO.length) setTimeout(fetchAMFINavs,200);
    } else throw new Error("HTTP "+r.status);
  } catch(e){
    // Fallback — any response from /v2/holdings means proxy is reachable
    try{
      const r2=await fetch(base+"/v2/holdings",{
        headers:{"access-token":S.apiKey||"probe","X-Dhan-Host":dhanHost()},
        signal:AbortSignal.timeout(4000)
      });
      S.proxyActive=true; showToast(`Proxy reachable (HTTP ${r2.status}) ✓`);
    } catch(e2){
      S.proxyActive=false;
      showToast(`Proxy not reachable at ${base} — run: node dhan-proxy.js`,"error");
    }
  }
  S.proxyTesting=false; render();
}

  S.renewingToken=true; render();

/* ══════════════════════════════════════════════════
   PORTFOLIO
══════════════════════════════════════════════════ */
async function fetchPortfolio(demo=false){
  S.portfolioLoading=true; S.portfolioError=null; S.isDemo=demo;
  render();

  if(demo){
    await new Promise(r=>setTimeout(r,600));
    S.etfHoldings=makeDemoHoldings(); S.lastRefreshed=new Date();
    const cur=S.etfHoldings.reduce((s,h)=>s+h.currentValue,0), prior=cur*1.03;
    const d30=new Date(); d30.setDate(d30.getDate()-30);
    S.snap30={date:d30.toISOString().slice(0,10),value:prior};
    S.thirtyDayPnLPct=parseFloat(((cur-prior)/prior*100).toFixed(1));
    S.lossPercent=Math.min(0,S.thirtyDayPnLPct);
    MF_PORTFOLIO.forEach((p,i)=>{
      if(!S.mfHoldings[p.isin]||!S.mfHoldings[p.isin].length){
        const units=[125.456,88.201][i]||100, avgNav=[18.5,55.2][i]||50;
        S.mfHoldings[p.isin]=[{date:"2024-01-01",units,nav:avgNav,amount:units*avgNav}];
      }
      const avgNav=[18.5,55.2][i]||50;
      S.mfNavs[p.isin]={nav:avgNav*1.08,date:new Date().toISOString().slice(0,10),schemeName:p.instrument};
    });
    S.portfolioLoading=false; render(); showToast("Demo loaded ✓"); return;
  }

  // ── STEP 1: /v2/holdings — always needed for securityId, qty, exchange ────
  const hR = await dhanApi("GET", "/v2/holdings");
  if(!hR.ok){
    S.portfolioError = hR.status===403 ? `TOKEN_403:${hR.error}` : hR.error||`HTTP ${hR.status}`;
    S.portfolioLoading=false; render(); return;
  }
  let allH = hR.data;
  if(!Array.isArray(allH)) allH = allH?.holdings || allH?.data || [];
  if(!Array.isArray(allH)){
    S.portfolioError = "Unexpected holdings response: "+JSON.stringify(hR.data).slice(0,80);
    S.portfolioLoading=false; render(); return;
  }

  function matchHolding(h){
    const sym = (h.tradingSymbol||"").toUpperCase().trim();
    const isn = (h.isin||"").toUpperCase().trim();
    return SYMBOL_MAP[sym] || ISIN_MAP[isn] || null;
  }
  const matched=[], unmatched=[];
  allH.forEach(h=>{ const m=matchHolding(h); if(m) matched.push({h,meta:m}); else unmatched.push(h); });
  addReqLog("PARSE","/v2/holdings",`${allH.length} total`,0,
    `matched=${matched.length} symbols=[${allH.map(h=>(h.tradingSymbol||"?").slice(0,10)).join(",")}]`);

  // ── STEP 2: LTP for all matched ETFs ─────────────────────────────────────
  const toSeg={"NSE":"NSE_EQ","BSE":"BSE_EQ","NSE_EQ":"NSE_EQ","BSE_EQ":"BSE_EQ","ALL":"NSE_EQ"};
  let ltpMap={};
  if(matched.length){
    const ltpPay={};
    matched.forEach(({h})=>{
      const seg=toSeg[(h.exchange||"NSE").toUpperCase()]||"NSE_EQ";
      if(!ltpPay[seg]) ltpPay[seg]=[];
      if(!ltpPay[seg].includes(String(h.securityId))) ltpPay[seg].push(String(h.securityId));
    });
    const lR=await dhanApi("POST","/v2/marketfeed/ltp",ltpPay);
    if(lR.ok&&lR.data){
      const segs=lR.data?.data||lR.data;
      Object.values(segs).forEach(seg=>{
        if(typeof seg!=="object"||!seg) return;
        Object.entries(seg).forEach(([id,info])=>{
          ltpMap[String(id)]=parseFloat(info?.last_price??info?.lastTradedPrice??info?.ltp??0)||0;
        });
      });
    }
  }

  // ── STEP 3: If trackingStartDate set → fetch tradebook for invested cost ──
  // /v2/trades/{from}/{to}/{page} — page through all BUY trades since that date
  // and aggregate qty + invested per ETF ticker.
  // This replaces the lifetime avgCostPrice from /v2/holdings.
  let tradeMap = null;

  if(S.trackingStartDate && matched.length){
    const today = new Date().toISOString().slice(0,10);
    let page=0, allTrades=[];
    while(page<30){
      const tR=await dhanApi("GET",`/v2/trades/${S.trackingStartDate}/${today}/${page}`);
      if(!tR.ok) break;
      let rows=tR.data;
      if(!Array.isArray(rows)) rows=rows?.data||rows?.trades||[];
      if(!Array.isArray(rows)||!rows.length) break;
      allTrades=allTrades.concat(rows);
      if(rows.length<50) break;
      page++;
    }

    const buys = allTrades.filter(t=>{
      const tx=(t.transactionType||t.trxnType||t.txnType||t.type||"").toUpperCase();
      return tx==="BUY" || tx==="B";
    });

    // securityId→meta: built from /v2/holdings which always has correct securityId
    const secIdMap={};
    matched.forEach(({h,meta})=>{
      if(h.securityId) secIdMap[String(h.securityId)]=meta;
    });

    // Also build partial-name map: "GOLDBEES" matches "NIPPON INDIA ETF GOLD BEES" etc.
    // and common Dhan-specific aliases
    const ALIASES = {
      "MON100":     ["MON100","MON100-EQ","MON100BE","MOTOSWALD","MOTILALOSWNN","MOFN100"],
      "GOLDBEES":   ["GOLDBEES","NIPGOLDETF","GOLD BEES","NIPPON GOLD","GOLDIETF"],
      "SILVERBEES": ["SILVERBEES","NIPSILVETF","SILVER BEES","NIPPON SILVER","SILVERIETF"],
      "NIFTYBEES":  ["NIFTYBEES","NIFTY BEES","NIPNIFTYETF","NIFTIETF"],
    };
    const ALIAS_MAP={};
    Object.entries(ALIASES).forEach(([ticker,aliases])=>{
      aliases.forEach(a=>{ ALIAS_MAP[a.toUpperCase()]=SYMBOL_MAP[ticker]; });
    });

    function resolveTradeToMeta(t){
      // Try every known field name for tradingSymbol and securityId
      const rawSym  = (t.tradingSymbol||t.symbol||t.scripName||t.customSymbol||"").toUpperCase().trim();
      const cleanSym= rawSym.replace(/[-_ ]?(EQ|BE|N1|N2|N3|N4|N5|ETF)$/,"").trim();
      const isn     = (t.isin||t.isinCode||"").toUpperCase().trim();
      const secId   = String(t.securityId||t.scripId||t.scripCode||t.exchangeToken||"");

      return SYMBOL_MAP[rawSym]
          || SYMBOL_MAP[cleanSym]
          || ALIAS_MAP[rawSym]
          || ALIAS_MAP[cleanSym]
          || (isn && ISIN_MAP[isn])
          || (secId && secId!=="undefined" && secIdMap[secId])
          || null;
    }

    // Log every unique (symbol, isin, secId) tuple so user can diagnose mismatches
    const tradeKeys=[...new Set(buys.map(t=>{
      const s=(t.tradingSymbol||t.symbol||"?").toUpperCase();
      const sec=t.securityId||t.scripId||"";
      const isn=t.isin||"";
      return [s, sec&&`id:${sec}`, isn&&`isin:${isn}`].filter(Boolean).join(" ");
    }))];
    addReqLog("PARSE",`/v2/trades (${S.trackingStartDate}→${today})`,
      `${allTrades.length} trades / ${buys.length} buys`, 0,
      `pages=${page+1} | keys: [${tradeKeys.join("] [")}]`);

    tradeMap={};
    const unresolved=new Set();
    buys.forEach(t=>{
      const meta=resolveTradeToMeta(t);
      if(!meta){ unresolved.add((t.tradingSymbol||t.symbol||"?").toUpperCase()); return; }

      const qty   = parseFloat(t.tradedQuantity||t.fillQty||t.executedQty||t.quantity||0);
      const price = parseFloat(t.tradedPrice||t.fillPrice||t.avgPrice||t.price||0);
      if(!qty||!price) return;

      // Parse trade date from various possible field names
      const rawDate = t.exchangeTime||t.createTime||t.tradeDate||t.orderDate||"";
      const tradeDate = rawDate
        ? (rawDate.includes("T") ? rawDate.slice(0,10) : rawDate.slice(0,10))
        : "";

      if(!tradeMap[meta.ticker])
        tradeMap[meta.ticker]={qty:0, invested:0, count:0, rawSymbol:"", trades:[]};

      tradeMap[meta.ticker].qty      += qty;
      tradeMap[meta.ticker].invested += qty*price;
      tradeMap[meta.ticker].count++;
      tradeMap[meta.ticker].rawSymbol = (t.tradingSymbol||"").toUpperCase();
      tradeMap[meta.ticker].trades.push({date:tradeDate, qty, price, amount:qty*price});
    });

    // Sort trades oldest→newest per ticker
    Object.values(tradeMap).forEach(td=>{
      td.trades.sort((a,b)=>a.date.localeCompare(b.date));
    });

    if(unresolved.size){
      addReqLog("WARN","trades: unresolved",`[${[...unresolved].join(", ")}]`,0,
        "Check Settings → Diagnostics for symbol/id — add alias to ALIASES map if needed");
    }
  }  // end if(S.trackingStartDate)

  // ── STEP 4: Build etfHoldings ─────────────────────────────────────────────
  S.etfHoldings = matched.map(({h, meta})=>{
    const ltp = ltpMap[String(h.securityId)]
             || parseFloat(h.lastTradedPrice||h.ltp||0)
             || parseFloat(h.avgCostPrice)||0;

    // Back-fill securityId for order placement
    const portEntry=ETF_PORTFOLIO.find(p=>
      p.ticker.toUpperCase()===(h.tradingSymbol||"").toUpperCase()||
      p.isin.toUpperCase()===(h.isin||"").toUpperCase());
    if(portEntry&&!portEntry.securityId&&h.securityId) portEntry.securityId=String(h.securityId);

    if(tradeMap&&tradeMap[meta.ticker]){
      // Cost AND qty from tradebook (date-filtered only)
      const td = tradeMap[meta.ticker];
      const heldQty    = parseInt(h.totalQty||h.dpQty||0);
      const tradeQty   = td.qty;
      const avgCost    = tradeQty>0 ? td.invested/tradeQty : 0;
      const inv        = td.invested;
      const cur        = tradeQty * ltp;
      return{
        ...meta,...h, ticker:meta.ticker,
        qty: tradeQty,
        heldQty,
        ltp, avgCostPrice:avgCost,
        investedValue:inv, currentValue:cur,
        unrealizedPnL:cur-inv,
        pnlPct:inv>0?((cur-inv)/inv)*100:0,
        t1Qty:parseInt(h.t1Qty||0), availableQty:parseInt(h.availableQty||heldQty),
        fromTrades:true, tradeCount:td.count, tradeSymbols:td.rawSymbol||"",
        trades: td.trades||[],
      };
    } else if(tradeMap){
      // trackingStartDate is set but zero trades found for this ETF → exclude from totals
      // Return a sentinel so the row renders as "not purchased since [date]"
      const heldQty = parseInt(h.totalQty||h.dpQty||0);
      const ltp2 = ltp;
      return{
        ...meta,...h, ticker:meta.ticker,
        qty:0, heldQty,
        ltp:ltp2, avgCostPrice:0,
        investedValue:0, currentValue:0,
        unrealizedPnL:0, pnlPct:0,
        t1Qty:0, availableQty:parseInt(h.availableQty||heldQty),
        fromTrades:true, tradeCount:0, tradeSymbols:"", trades:[],
        notTracked:true,  // flag: held but not bought since tracking date
      };
    } else {
      // No tracking date — use lifetime avg from /v2/holdings
      const qty=parseInt(h.totalQty||h.dpQty||0);
      const avgCost=parseFloat(h.avgCostPrice)||0;
      const inv=qty*avgCost, cur=qty*ltp;
      return{
        ...meta,...h, ticker:meta.ticker,
        qty, ltp, avgCostPrice:avgCost,
        investedValue:inv, currentValue:cur,
        unrealizedPnL:cur-inv,
        pnlPct:inv>0?((cur-inv)/inv)*100:0,
        t1Qty:parseInt(h.t1Qty||0), availableQty:parseInt(h.availableQty||qty),
        fromTrades:false, tradeCount:0, trades:[],
      };
    }
  });

  S.unmatchedHoldings = unmatched.map(h=>({
    ...h,
    qty:parseInt(h.totalQty||h.dpQty||0),
    avgCostPrice:parseFloat(h.avgCostPrice)||0,
    ltp:parseFloat(h.lastTradedPrice||h.ltp||0)||parseFloat(h.avgCostPrice)||0,
  }));
  S.lastRefreshed=new Date();

  const updated=saveSnapshot(totalCurrent());
  S.snapshots=updated; S.snap30=get30DayValue(updated);
  if(S.snap30&&S.snap30.value>0){
    const p=((totalCurrent()-S.snap30.value)/S.snap30.value)*100;
    S.thirtyDayPnLPct=parseFloat(p.toFixed(1));
    S.lossPercent=Math.min(0,S.thirtyDayPnLPct);
  } else {S.thirtyDayPnLPct=0;S.lossPercent=0;}

  const mode=S.trackingStartDate?`trades from ${S.trackingStartDate}`:"lifetime avg";
  showToast(`${S.etfHoldings.filter(h=>h.fromTrades!==undefined||true).length}/${ETF_PORTFOLIO.length} ETFs synced · ${mode} ✓`);
  S.portfolioLoading=false; render();
}

async function fetchChargesForOrder(orderId){
  const today=new Date().toISOString().slice(0,10);
  const r=await dhanApi("GET",`/v2/trades/${today}/${today}/0`);
  if(!r.ok||!Array.isArray(r.data))return null;
  const trade=r.data.find(t=>String(t.orderId)===String(orderId));
  if(!trade)return null;
  const stt=+trade.stt||0,sebi=+trade.sebiTax||0,brok=+trade.brokerageCharges||0,
        gst=+trade.serviceTax||0,exch=+trade.exchangeTransactionCharges||0,stamp=+trade.stampDuty||0;
  return{stt,sebi,brokerage:brok,gst,exchCharge:exch,stamp,total:stt+sebi+brok+gst+exch+stamp,
         tradedPrice:trade.tradedPrice,tradedQty:trade.tradedQuantity,
         exchangeTradeId:trade.exchangeTradeId,exchangeTime:trade.exchangeTime};
}

function isModalLocked(){ return S.om.phase==="placing"||S.om.phase==="polling"; }

function openOrderModal(p){
  if(!S.connected){showToast("Connect first","error");return;}
  if(!S.proxyActive){showToast("Enable proxy first","error");return;}

function paintOrderModal(){
  const om=S.om; if(!om.p)return;
  const p=om.p, locked=isModalLocked();
  const envLabel=S.dhanEnv==="sandbox"
    ?`<span class="badge badge-amber" style="font-size:10px">🧪 SANDBOX</span>`
    :`<span class="badge badge-green" style="font-size:10px">🏦 PRODUCTION</span>`;

  el("om-title").textContent=`Place Order — ${p.ticker}`;
  el("om-env-badge").innerHTML=`${envLabel} · Direct API · ${dhanHost()}`;
  el("om-icon").textContent=p.icon||"📊";
  el("om-name").textContent=p.instrument;
  el("om-ticker").textContent=p.ticker;
  el("om-amt").textContent=fmtC(om.amount);

  // Lock/unlock X button
  const xbtn=el("om-x");
  xbtn.disabled=locked; xbtn.style.opacity=locked?"0.2":"1";

  let statusHtml="";
  if(om.phase==="idle"){
    statusHtml=`<div class="om-status om-idle">
      Ready to place a MARKET BUY order. Confirm to send to ${dhanHost()}.

async function executeOrder(){
  const om=S.om; if(!om.p)return;
  const p=om.p;

  om.phase="placing"; paintOrderModal();

  const r=await dhanApi("POST","/v2/orders",{
    dhanClientId:S.clientId, transactionType:"BUY", exchangeSegment:"NSE_EQ",
    productType:"CNC", orderType:"MARKET", validity:"DAY",
    tradingSymbol:p.ticker,
    securityId: p.securityId ||
                (S.etfHoldings.find(h=>h.isin===p.isin)?.securityId) ||
                p.isin,   // fallback — lookup should have run
    quantity:1, price:0
  });

  if(!r.ok){
    om.phase="error"; om.message=r.error||`HTTP ${r.status}`;
    paintOrderModal(); return;
  }
  const orderId=r.data?.orderId;
  if(!orderId){
    om.phase="error"; om.message="No orderId in response: "+JSON.stringify(r.data).slice(0,80);
    paintOrderModal(); return;
  }

  om.orderId=orderId; om.phase="polling"; om.pollCount=0;
  paintOrderModal();

  const OK_STATUSES  =["TRADED","PART_TRADED","TRANSIT","EXECUTED","COMPLETE","FILLED","CONFIRMED"];
  const BAD_STATUSES =["REJECTED","CANCELLED","EXPIRED","FAILED"];

  const poll=async()=>{
    om.pollCount++;
    if(om.pollCount>24){om.phase="timeout";paintOrderModal();return;}
    const oR=await dhanApi("GET","/v2/orders");
    if(oR.ok&&Array.isArray(oR.data)){
      const ord=oR.data.find(o=>String(o.orderId)===String(orderId));
      if(ord){
        const st=(ord.orderStatus||"").toUpperCase();
        if(OK_STATUSES.includes(st)){
          om.phase="done";
          om.tradedPrice=parseFloat(ord.avgTradedPrice||ord.averageTradedPrice||0)||null;
          om.tradedQty  =parseInt(ord.filledQty||ord.tradedQuantity||1);
          paintOrderModal();
          // Log to session orders
          S.orders.unshift({id:orderId,instrument:p.instrument,ticker:p.ticker,amount:om.amount,
            time:new Date().toLocaleTimeString(),status:"EXECUTED",color:p.color,icon:p.icon,
            charges:null,chargesLoading:true,tradedPrice:om.tradedPrice,tradedQty:om.tradedQty});
          showToast(`${p.ticker} ✓ executed — fetching charges…`);
          // Async charges fetch
          (async()=>{
            let ch=null;
            for(let a=0;a<7;a++){await new Promise(r=>setTimeout(r,a===0?3000:2500));ch=await fetchChargesForOrder(orderId);if(ch)break;}
            const idx=S.orders.findIndex(o=>o.id===orderId);
            if(idx!==-1){S.orders[idx].charges=ch;S.orders[idx].chargesLoading=false;if(ch){S.orders[idx].tradedPrice=ch.tradedPrice;S.orders[idx].tradedQty=ch.tradedQty;}}
            om.charges=ch; paintOrderModal();
            if(S.tab==="execute")render();
          })();
          return;
        }
        if(BAD_STATUSES.includes(st)){
          om.phase="rejected";
          om.message=ord.omsErrorDescription||ord.remarks||ord.errorDescription||st;
          paintOrderModal(); return;
        }
      }
    }
    om.pollTimer=setTimeout(poll,2200);
    paintOrderModal();
  };
  setTimeout(poll,1500);
}

      const othCur = S.unmatchedHoldings.reduce((s,h)=>s+h.qty*(h.ltp||h.avgCostPrice),0);
      out+=`<div style="border-top:1px solid #18263A">
        <button onclick="S.showOtherHoldings=!S.showOtherHoldings;render()"
          style="width:100%;display:flex;align-items:center;justify-content:space-between;padding:12px 20px;background:transparent;border:none;cursor:pointer;color:#60778A;font-family:inherit;font-size:12px">
          <span style="display:flex;align-items:center;gap:8px">
            <span style="font-size:14px">${S.showOtherHoldings?"▾":"▸"}</span>
            <span>${S.unmatchedHoldings.length} other holding${S.unmatchedHoldings.length>1?"s":""} in your Dhan account</span>
            <span class="badge badge-dim" style="font-size:10px">not accounted</span>
          </span>
          <span class="mono" style="font-size:11px;color:#40556A">${fmtC(othCur)} · ${fmtP(othInv>0?(othCur-othInv)/othInv*100:0)}</span>
        </button>
        ${S.showOtherHoldings ? S.unmatchedHoldings.map(h=>{
          const ltp=h.ltp||h.avgCostPrice||0, inv=h.qty*h.avgCostPrice, cur=h.qty*ltp;

          return `<div class="htable-row" style="opacity:0.65;background:#060910">
            <div style="display:flex;align-items:center;gap:10px">
              <div style="width:34px;height:34px;border-radius:8px;background:#18263A;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#40556A;flex-shrink:0">${(h.tradingSymbol||"?").slice(0,4)}</div>

            </div>
            <div style="text-align:right"><div class="mono" style="font-size:13px;color:#60778A">${fmt(h.qty)}</div></div>
            <div style="text-align:right" class="hcol3"><div class="mono" style="font-size:12px;color:#40556A">${fmtC(h.avgCostPrice)}</div></div>
            <div style="text-align:right" class="hcol4"><div class="mono" style="font-size:12px;color:#60778A">${ltp?fmtC(ltp):"—"}</div></div>
            <div style="text-align:right"><div class="mono" style="font-size:13px;color:#60778A">${fmtC(cur)}</div></div>
            <div style="text-align:right"><span class="badge" style="background:${pnlBg(pct)};border:1px solid ${pnlBorder(pct)};color:${pnlColor(pct)};opacity:0.8">${fmtP(pct)}</span></div>
          </div>`;
        }).join("") : ""}
      </div>`;
    }

    out+=`<div class="htable-foot">
      <div style="font-size:12px;font-weight:700;color:#60778A;text-transform:uppercase;letter-spacing:.8px">ETF Total</div>
      <div></div><div class="hcol3" style="text-align:right"><span class="mono" style="font-size:13px;color:#60778A">${fmtC(inv)}</span></div><div class="hcol4"></div>
      <div style="text-align:right"><span class="mono" style="font-size:16px;font-weight:700;color:#4FC3F7">${fmtC(cur)}</span></div>
      <div style="text-align:right">
        <div class="mono" style="font-size:14px;font-weight:700;color:${pnlColor(pct)}">${pnl>=0?"+":"−"}${fmtC(Math.abs(pnl))}</div>
        <span class="badge" style="background:${pnlBg(pct)};border:1px solid ${pnlBorder(pct)};color:${pnlColor(pct)};margin-top:4px">${fmtP(pct)}</span>
      </div></div></div>`;

    // ── MUTUAL FUND SECTION ──────────────────────────────────────────

    // SIP banner
    out+=`<div class="sip-banner" style="margin-top:16px">
      <div>
        <div class="mono" style="font-size:12px;color:#40556A;margin-bottom:6px">
          ETF ${fmtC(cur)} + MF ${fmtC(mfCur2)} = <strong style="color:#4FC3F7">${fmtC(grandCur)}</strong>
          ${grandInv>0?` · P&L <strong style="color:${pnlColor(grandPct)}">${fmtP(grandPct)}</strong>`:""}
        </div>
        <div class="serif" style="font-size:26px;color:#4FC3F7">${fmtC(sip)} <span style="font-size:14px;color:#60778A">SIP this month</span></div>
        ${s30&&pct30<0?`<div style="font-size:12px;color:#D97706;margin-top:5px">⚡ Dip-boosted</div>`:""}
      </div>
      <div class="btn-row">
        <button class="btn btn-blue" onclick="switchTab('execute')">⚡ Execute SIP</button>
        <button class="btn btn-ghost btn-sm" onclick="logSIP()">📝 Log</button>
      </div>
    </div>`;
  } else if(!S.portfolioLoading&&!S.portfolioError){
    out+=`<div style="text-align:center;padding:48px 20px;color:#40556A">
      <div style="font-size:36px;margin-bottom:12px">📦</div>
      <div style="font-size:14px;margin-bottom:16px">Connect Dhan to see ETF holdings</div>
      <div class="btn-row" style="justify-content:center">
        <button class="btn btn-amber btn-sm" onclick="switchTab('settings')">🔑 Connect</button>
        <button class="btn btn-ghost btn-sm" onclick="fetchPortfolio(true)">🎭 Demo</button>
      </div>
    </div>`;
  }
  out+=renderMFSection();
  out+=`</div>`;
  return out;
}

    S.todayOrders.length?`
      ${(()=>{
        const OK=["TRADED","PART_TRADED","EXECUTED","COMPLETE","FILLED","CONFIRMED","TRANSIT"];
        const BAD=["REJECTED","CANCELLED","EXPIRED","FAILED"];
        const filled=S.todayOrders.filter(o=>OK.includes((o.orderStatus||"").toUpperCase())).length;
        const bad=S.todayOrders.filter(o=>BAD.includes((o.orderStatus||"").toUpperCase())).length;
        const pend=S.todayOrders.length-filled-bad;
        return `<div style="display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap">
          <span class="badge badge-green">✓ ${filled} Filled</span>
          ${pend?`<span class="badge badge-blue">⏳ ${pend} Pending</span>`:""}
          ${bad?`<span class="badge badge-red">✕ ${bad} Rejected</span>`:""}
          <span class="badge badge-dim">${S.todayOrders.length} Total</span>
        </div>`;
      })()}

      <table class="ord-table"><thead><tr>
        <th>Time</th><th>Symbol</th><th>Side</th><th>Qty</th><th>Price</th><th>Status</th><th>Reason</th>
      </tr></thead><tbody>
        ${S.todayOrders.map(o=>{
          const st=(o.orderStatus||"").toUpperCase();
          const OK=["TRADED","PART_TRADED","EXECUTED","COMPLETE","FILLED","CONFIRMED","TRANSIT"];
          const BAD=["REJECTED","CANCELLED","EXPIRED","FAILED"];
          const chipCls=OK.includes(st)?"os os-ok":BAD.includes(st)?"os os-bad":"os os-pend";
          const t=(o.exchangeTime||o.updateTime||o.createTime||"").split(" ")[1]||"—";
          const reason=BAD.includes(st)?(o.omsErrorDescription||o.remarks||""):"";
          return `<tr>
            <td class="mono" style="color:#60778A;font-size:11px;white-space:nowrap">${t}</td>
            <td style="font-weight:600">${o.tradingSymbol||"—"}</td>
            <td style="font-weight:700;color:${o.transactionType==="BUY"?"#4ADE80":"#F87171"}">${o.transactionType||"—"}</td>
            <td class="mono">${o.filledQty||o.tradedQuantity||"0"}/${o.quantity||"—"}</td>
            <td class="mono">${o.avgTradedPrice?fmtC(o.avgTradedPrice):o.price?fmtC(o.price):"MKT"}</td>
            <td><span class="${chipCls}">${st}</span></td>
            <td style="font-size:11px;color:#F87171;max-width:120px">${reason.slice(0,50)}</td>
          </tr>`;
        }).join("")}
      </tbody></table></div>`:""}
  </div></div>`;
  return out;
}

function renderHistory(){
  let out=`<div class="anim-fade"><div class="card">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:18px">
      <div class="section-title" style="margin-bottom:0">SIP History</div>

    out+=`<div style="text-align:center;padding:48px 24px;color:#40556A"><div style="font-size:40px;margin-bottom:10px">📋</div><div>No entries yet. Log from Calculator tab.</div></div>`;
  } else {
    S.history.forEach(h=>{
      out+=`<div class="history-row">
        <div><div style="font-size:14px;font-weight:600">${h.date}</div>
          <div style="font-size:12px;color:#60778A;margin-top:2px">30-Day P&L: ${h.loss}% · Floor: ${fmtC(h.yearFloor)}</div></div>
        <div style="text-align:right">
          <div class="mono" style="font-size:17px;color:${h.loss<0?"#F87171":"#4ADE80"}">${fmtC(h.amount)}</div>

    out+=`<div style="padding:12px 16px;background:#0B1926;border-radius:11px;border:1px solid #1351A860;display:flex;justify-content:space-between;margin-top:4px">

function switchTab(t){if(S.tab==="growth")destroyChart();S.tab=t;render();}
function toggleTicker(ticker){S.expandedTicker=(S.expandedTicker===ticker?null:ticker);render();}

function render(){
  const isSandbox=S.dhanEnv==="sandbox";
  el("hdr-badges").innerHTML=`
    ${S.lastRefreshed&&S.tab==="portfolio"?`<span style="font-size:11px;color:#40556A">↻ ${S.lastRefreshed.toLocaleTimeString()}</span>`:""}
    ${S.isDemo?`<span class="badge badge-amber">🎭 Demo</span>`:""}
    ${isSandbox?`<span class="badge badge-amber">🧪 SANDBOX</span>`:""}
    ${S.proxyActive
      ?`<span class="badge badge-purple"><span style="width:6px;height:6px;border-radius:50%;background:#A5B4FC;display:inline-block;animation:pulse 2s infinite"></span>Proxy</span>`
      :`<span class="badge badge-dim">No Proxy</span>`}
    ${S.connected
      ?`<span class="badge badge-green"><span class="live-dot"></span>${isSandbox?"Sandbox":"Dhan Live"}</span>`
      :`<span class="badge badge-red">Not Connected</span>`}
  `;
  document.querySelectorAll(".tab").forEach(t=>t.classList.toggle("active",t.dataset.tab===S.tab));
  let html="";
  if(S.tab==="portfolio")   html=renderPortfolio();
  else if(S.tab==="dashboard")  html=renderDashboard();
  else if(S.tab==="calculator") html=renderCalculator();
  else if(S.tab==="execute")    html=renderExecute();
  else if(S.tab==="history")    html=renderHistory();
  else if(S.tab==="growth")     html=renderGrowth();
  else if(S.tab==="settings")   html=renderSettings();
  el("content").innerHTML=html;
  if(S.tab==="settings") repaintReqLog();
  if(S.tab==="growth") requestAnimationFrame(buildGrowthChart);
  clearInterval(S.refreshTimer);
  if(S.tab==="portfolio"&&S.connected&&!S.isDemo)
    S.refreshTimer=setInterval(()=>fetchPortfolio(false),60000);
}
